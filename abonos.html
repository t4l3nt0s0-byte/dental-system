<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00C2A8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hersantych">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://*.firebaseio.com https://*.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com;"><link rel="icon" href="favicon.ico" sizes="any"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="shortcut icon" href="favicon.ico"><link rel="apple-touch-icon" href="icons/icon-192.png"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hersantych · Abonos & Pagos</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filters .search-wrap{flex:1;min-width:180px}
.abono-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.sum-val{font-family:var(--font-mono);font-size:1.25rem;font-weight:700;margin-bottom:3px}
.sum-label{font-size:.72rem;color:var(--text-muted)}
.forma-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:.68rem;font-weight:600}
.forma-Efectivo{background:var(--green-dim);color:var(--green)}
.forma-Transferencia{background:var(--blue-dim);color:var(--blue)}
.forma-Tarjeta,.forma-TDC,.forma-TDD{background:var(--purple-dim);color:var(--purple)}
.forma-Cheque{background:var(--gold-dim);color:var(--gold)}
.forma-default{background:var(--surface2);color:var(--text-muted)}
@media(max-width:900px){.abono-summary{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<button class="hamburger" id="hamburger">☰</button>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">💰 Abonos & Pagos</div>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="btnNuevo">+ Registrar pago</button>
      <button class="btn btn-ghost btn-sm" id="btnExport">📥 CSV</button>
    </div>
  </div>
  <div class="content">
    <div class="abono-summary" id="abonoSummary">
      <div class="sum-card"><div class="spinner" style="margin:8px auto"></div></div>
      <div class="sum-card"></div><div class="sum-card"></div><div class="sum-card"></div>
    </div>
    <div class="filters">
      <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="searchInput" placeholder="Buscar por paciente o tratamiento..."></div>
      <select class="form-select" id="filterForma" style="width:150px">
        <option value="">Todas las formas</option>
        <option>Efectivo</option><option>Transferencia</option><option>Tarjeta</option><option>TDC</option><option>TDD</option><option>Cheque</option><option>Otro</option>
      </select>
      <input type="date" class="form-input" id="filterFecha" style="width:160px">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('filterFecha').value='';renderTable()">✕ Limpiar</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Fecha</th><th>Paciente</th><th>Tratamiento</th><th>Monto</th><th>IVA (16%)</th><th>Total</th><th>Forma de pago</th><th>Concepto</th><th>Recibo</th><th>Acciones</th></tr></thead>
      <tbody id="abonoBody"><tr><td colspan="10"><div class="loader"><div class="spinner"></div>Cargando...</div></td></tr></tbody>
    </table></div>
  </div>
</main>

<!-- MODAL NUEVO ABONO -->
<div class="modal-overlay" id="modalAbono">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalAbonoTitle">Registrar Pago</div>
      <button class="modal-close" onclick="closeModal('modalAbono')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Paciente *</label>
          <select class="form-select" id="f-paciente" onchange="loadTratsByPx()"><option value="">Seleccionar paciente...</option></select>
        </div>
        <div class="form-group full">
          <label class="form-label">Tratamiento *</label>
          <select class="form-select" id="f-tratamiento"><option value="">Seleccionar tratamiento...</option></select>
        </div>
        <div class="form-group"><label class="form-label">Fecha del pago *</label><input type="date" class="form-input" id="f-fecha"></div>
        <div class="form-group"><label class="form-label">Monto (MXN) *</label><input type="number" class="form-input" id="f-monto" min="0" step="0.01" oninput="calcIVA()"></div>
        <div class="form-group"><label class="form-label">¿Aplica IVA?</label>
          <select class="form-select" id="f-iva" onchange="calcIVA()"><option value="no">Sin IVA</option><option value="si">Con IVA (16%)</option></select>
        </div>
        <div class="form-group"><label class="form-label">Total a cobrar</label><input class="form-input" id="f-total" readonly style="color:var(--teal)"></div>
        <div class="form-group"><label class="form-label">Forma de pago *</label>
          <select class="form-select" id="f-forma"><option>Efectivo</option><option>Transferencia</option><option>Tarjeta</option><option>TDC</option><option>TDD</option><option>Cheque</option><option>Otro</option></select>
        </div>
        <div class="form-group"><label class="form-label">N° Recibo / Referencia</label><input class="form-input" id="f-recibo" placeholder="R-001"></div>
        <div class="form-group full"><label class="form-label">Concepto / Notas</label><textarea class="form-textarea" id="f-concepto" placeholder="Abono, pago parcial, liquidación..." rows="2"></textarea></div>
      </div>
      <div id="saldoInfo" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px;font-size:.8rem;color:var(--text-muted);display:none">
        Saldo actual del tratamiento: <span id="saldoActual" style="color:var(--gold);font-family:var(--font-mono);font-weight:700"></span>
        → Nuevo saldo: <span id="nuevoSaldo" style="color:var(--text);font-family:var(--font-mono);font-weight:700"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalAbono')">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveAbono">💾 Registrar pago</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script src="dataService.js"></script>
<script>
window.CURRENT_PAGE = 'abonos';
let allAbonos = [], allPacientes = [], allTrat = [], editId = null;

initSession('any').then(async session => {
  if (!session) return;
  const tratId = new URLSearchParams(location.search).get('trat');
  await Promise.all([loadAbonos(), loadPacientes(), loadTrat()]);
  if (tratId) { abrirModalParaTrat(tratId); }
  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('filterForma').addEventListener('change', renderTable);
  document.getElementById('filterFecha').addEventListener('change', renderTable);
  document.getElementById('btnNuevo').addEventListener('click', openNewModal);
  document.getElementById('btnSaveAbono').addEventListener('click', saveAbono);
  document.getElementById('btnExport').addEventListener('click', exportCSV);
  document.getElementById('f-monto').addEventListener('input', updateNuevoSaldo);
  document.getElementById('f-iva').addEventListener('change', updateNuevoSaldo);
  document.getElementById('f-fecha').value = todayISO();
});

async function loadAbonos() {
  allAbonos = await fsGetAll('abonos',r=>r.limit(500));
  renderTable();
  renderSummary();
}
async function loadPacientes() {
  allPacientes = await fsGetAll('pacientes', r => r.orderBy('nombre','asc'));
  const sel = document.getElementById('f-paciente');
  sel.innerHTML = '<option value="">Seleccionar paciente...</option>' +
    allPacientes.map(p=>`<option value="${p.id}">${p.nombre||p.id}</option>`).join('');
}
async function loadTrat() {
  allTrat = await fsGetAll('tratamientos',r=>r.limit(200));
}

window.loadTratsByPx = function() {
  const expId = document.getElementById('f-paciente').value;
  const sel = document.getElementById('f-tratamiento');
  const conSaldo = allTrat.filter(t => t.expId===expId && Number(t.saldo||0)>0);
  sel.innerHTML = '<option value="">Seleccionar tratamiento...</option>' +
    conSaldo.map(t=>`<option value="${t.id}" data-saldo="${t.saldo}" data-nombre="${t.tratamiento}">${t.tratamiento} (saldo: ${fmtMXN(t.saldo)})</option>`).join('');
  sel.addEventListener('change', updateSaldoInfo);
  updateSaldoInfo();
};

function updateSaldoInfo() {
  const sel = document.getElementById('f-tratamiento');
  const opt = sel.options[sel.selectedIndex];
  const saldo = parseFloat(opt?.dataset.saldo||0);
  if (saldo > 0) {
    document.getElementById('saldoInfo').style.display = 'block';
    document.getElementById('saldoActual').textContent = fmtMXN(saldo);
    updateNuevoSaldo();
  } else {
    document.getElementById('saldoInfo').style.display = 'none';
  }
}

function updateNuevoSaldo() {
  const sel = document.getElementById('f-tratamiento');
  const opt = sel.options[sel.selectedIndex];
  const saldo = parseFloat(opt?.dataset.saldo||0);
  const monto = parseFloat(document.getElementById('f-monto').value)||0;
  const iva = document.getElementById('f-iva').value;
  const montoReal = iva==='si' ? monto : monto;
  const nuevo = Math.max(0, saldo - montoReal);
  document.getElementById('nuevoSaldo').textContent = fmtMXN(nuevo);
  calcIVA();
}

window.calcIVA = function() {
  const monto = parseFloat(document.getElementById('f-monto').value)||0;
  const iva = document.getElementById('f-iva').value;
  const total = iva==='si' ? monto*1.16 : monto;
  document.getElementById('f-total').value = iva==='si' ? fmtMXN(total) : '—';
};

function renderSummary() {
  const hoy = todayISO();
  const mes = hoy.slice(0,7);
  const totalMes = allAbonos.filter(a=>a.fecha?.startsWith(mes)).reduce((s,a)=>s+Number(a.monto||0),0);
  const totalHoy = allAbonos.filter(a=>a.fecha===hoy).reduce((s,a)=>s+Number(a.monto||0),0);
  const totalGeneral = allAbonos.reduce((s,a)=>s+Number(a.monto||0),0);
  const efectivo = allAbonos.filter(a=>a.forma==='Efectivo').reduce((s,a)=>s+Number(a.monto||0),0);
  document.getElementById('abonoSummary').innerHTML = `
    <div class="sum-card"><div class="sum-val" style="color:var(--teal)">${fmtMXN(totalHoy)}</div><div class="sum-label">💵 Cobrado hoy</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--blue)">${fmtMXN(totalMes)}</div><div class="sum-label">📅 Cobrado este mes</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--green)">${fmtMXN(efectivo)}</div><div class="sum-label">💵 Total en efectivo</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--text)">${fmtMXN(totalGeneral)}</div><div class="sum-label">📊 Total histórico</div></div>`;
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const f = document.getElementById('filterForma').value;
  const fecha = document.getElementById('filterFecha').value;
  const filtered = allAbonos.filter(a =>
    (!q || a.paciente?.toLowerCase().includes(q) || a.tratamiento?.toLowerCase().includes(q)) &&
    (!f || a.forma===f) &&
    (!fecha || a.fecha===fecha)
  );
  const tbody = document.getElementById('abonoBody');
  if (!filtered.length) {
    tbody.innerHTML=`<tr><td colspan="10"><div class="empty-state"><div class="empty-icon">💰</div><div class="empty-title">Sin pagos registrados</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(a => {
    const ivaAmt = a.aplicaIva ? IVA(a.monto) : 0;
    const total = a.aplicaIva ? conIVA(a.monto) : Number(a.monto||0);
    const formaCls = `forma-${(a.forma||'default').replace(/\s/g,'')}`;
    return `<tr>
      <td style="font-family:var(--font-mono);font-size:.78rem">${a.fecha||'—'}</td>
      <td><div style="font-weight:600;color:var(--text);font-size:.83rem">${esc(a.paciente)||'—'}</div></td>
      <td style="font-size:.78rem">${esc(a.tratamiento)||'—'}</td>
      <td style="font-family:var(--font-mono);color:var(--teal)">${fmtMXN(a.monto)}</td>
      <td style="font-family:var(--font-mono);font-size:.78rem;color:var(--text-muted)">${a.aplicaIva?fmtMXN(ivaAmt):'—'}</td>
      <td style="font-family:var(--font-mono);font-weight:700">${fmtMXN(total)}</td>
      <td><span class="forma-badge ${formaCls}">${a.forma||'—'}</span></td>
      <td style="font-size:.77rem;color:var(--text-muted)">${esc(a.concepto)||'—'}</td>
      <td style="font-family:var(--font-mono);font-size:.75rem;color:var(--text-dim)">${a.recibo||'—'}</td>
      <td>
        <div style="display:flex;gap:5px">
          <a href="recibo.html?abono=${a.id}" class="btn btn-ghost btn-sm" title="Generar recibo">🧾</a>
          <button class="btn btn-ghost btn-sm" onclick="editAbono('${a.id}')">✏️</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteAbono('${a.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function abrirModalParaTrat(tratId) {
  const t = allTrat.find(x=>x.id===tratId); if(!t) return;
  openNewModal();
  setTimeout(()=>{
    document.getElementById('f-paciente').value = t.expId||'';
    loadTratsByPx();
    setTimeout(()=>{ document.getElementById('f-tratamiento').value = tratId; updateSaldoInfo(); }, 200);
  }, 100);
}

function openNewModal() {
  editId = null;
  document.getElementById('modalAbonoTitle').textContent = 'Registrar Pago';
  document.getElementById('f-paciente').value = '';
  document.getElementById('f-tratamiento').innerHTML = '<option value="">Seleccionar tratamiento...</option>';
  document.getElementById('f-fecha').value = todayISO();
  document.getElementById('f-monto').value = '';
  document.getElementById('f-iva').value = 'no';
  document.getElementById('f-total').value = '';
  document.getElementById('f-forma').value = 'Efectivo';
  document.getElementById('f-recibo').value = '';
  document.getElementById('f-concepto').value = '';
  document.getElementById('saldoInfo').style.display = 'none';
  openModal('modalAbono');
}

function editAbono(id) {
  editId = id;
  const a = allAbonos.find(x=>x.id===id); if(!a) return;
  document.getElementById('modalAbonoTitle').textContent = 'Editar Pago';
  document.getElementById('f-paciente').value = a.expId||'';
  loadTratsByPx();
  setTimeout(()=>{
    document.getElementById('f-tratamiento').value = a.tratId||'';
    document.getElementById('f-fecha').value = a.fecha||todayISO();
    document.getElementById('f-monto').value = a.monto||0;
    document.getElementById('f-iva').value = a.aplicaIva?'si':'no';
    document.getElementById('f-forma').value = a.forma||'Efectivo';
    document.getElementById('f-recibo').value = a.recibo||'';
    document.getElementById('f-concepto').value = a.concepto||'';
    calcIVA();
  }, 200);
  openModal('modalAbono');
}

async function saveAbono() {
  const expId = document.getElementById('f-paciente').value;
  const tratId = document.getElementById('f-tratamiento').value;
  const monto = parseFloat(document.getElementById('f-monto').value)||0;
  if (!expId || !tratId || !monto) { showToast('Completa todos los campos requeridos','error'); return; }
  if (monto <= 0) { showToast('El monto debe ser mayor a cero','error'); return; }
  if (monto > 999999) { showToast('Monto inusualmente alto. Verifica antes de guardar.','error'); return; }
  // Validar que el abono no supere el saldo pendiente del tratamiento
  const trat = allTrats.find(t=>t.id===tratId);
  if (trat && !editId) {
    const saldoActual = Number(trat.saldo||trat.costo||0);
    if (monto > saldoActual && saldoActual > 0) {
      const ok = await confirmDialog(
        `⚠️ El abono ($${monto.toLocaleString('es-MX')}) supera el saldo pendiente ($${saldoActual.toLocaleString('es-MX')}).\n\n¿Es un anticipo o saldo a favor? Si no, verifica el monto.`
      );
      if (!ok) return;
    }
  }
  const px = allPacientes.find(p=>p.id===expId);
  const trat = allTrat.find(t=>t.id===tratId);
  const aplicaIva = document.getElementById('f-iva').value === 'si';
  const data = {
    expId, tratId,
    paciente: px?.nombre||'—',
    tratamiento: trat?.tratamiento||'—',
    fecha: document.getElementById('f-fecha').value,
    monto, aplicaIva,
    forma: document.getElementById('f-forma').value,
    recibo: document.getElementById('f-recibo').value.trim(),
    concepto: document.getElementById('f-concepto').value.trim(),
  };
  const btn = document.getElementById('btnSaveAbono');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    if (editId) {
      await fsUpdate('abonos', editId, data);
    } else {
      await DS.abonos.create(data);
      // Update tratamiento saldo
      if(typeof audit==='function') audit('CREATE_ABONO',{monto:data.monto,paciente:data.paciente||''})
      if (trat) {
        const nuevoAbonado = Number(trat.abonado||0) + monto;
        const nuevoSaldo = Math.max(0, Number(trat.saldo||trat.costo||0) - monto);
        const nuevoEstado = nuevoSaldo <= 0 ? 'Liquidado' : 'Abonando';
        await fsUpdate('tratamientos', tratId, { abonado: nuevoAbonado, saldo: nuevoSaldo, estado: nuevoEstado });
        // Update local cache
        const idx = allTrat.findIndex(t=>t.id===tratId);
        if(idx>=0){ allTrat[idx].abonado=nuevoAbonado; allTrat[idx].saldo=nuevoSaldo; allTrat[idx].estado=nuevoEstado; }
      }
    }
    showToast(editId ? 'Pago actualizado':'Pago registrado', 'success');
    closeModal('modalAbono');
    await loadAbonos();
  } catch(e) { handleError(e, 'abonos'); }
  btn.disabled = false; btn.textContent = '💾 Registrar pago';
}

async function deleteAbono(id) {
  if (!await confirmDialog('¿Eliminar este pago? El saldo del tratamiento será revertido.')) return;
  const a = allAbonos.find(x=>x.id===id); if(!a) return;
  try {
    // Revert treatment saldo
    if (a.tratId) {
      const trat = allTrat.find(t=>t.id===a.tratId);
      if(trat){
        const nuevoAbonado = Math.max(0, Number(trat.abonado||0)-Number(a.monto||0));
        const nuevoSaldo = Number(trat.costo||0) - nuevoAbonado;
        const nuevoEstado = nuevoSaldo<=0?'Liquidado': nuevoAbonado>0?'Abonando':'Pendiente';
        await fsUpdate('tratamientos', a.tratId, {abonado:nuevoAbonado, saldo:nuevoSaldo, estado:nuevoEstado});
      }
    }
    await DS.abonos.delete(id);
    showToast('Pago eliminado','success');
    if(typeof audit==='function') audit('DELETE_ABONO',{id:id||''});
    await loadAbonos();
  } catch(e) { handleError(e, 'abonos'); }
}

function exportCSV() {
  const headers=['Fecha','Paciente','Tratamiento','Monto','IVA','Total','Forma','Concepto','Recibo'];
  const rows=allAbonos.map(a=>{
    const ivaAmt=a.aplicaIva?IVA(a.monto):0;
    const total=a.aplicaIva?conIVA(a.monto):Number(a.monto||0);
    return[a.fecha,a.paciente,a.tratamiento,a.monto,ivaAmt.toFixed(2),total.toFixed(2),a.forma,a.concepto,a.recibo].map(v=>`"${v||''}"`).join(',');
  });
  const csv=[headers.join(','),...rows].join('\n');
  const el=document.createElement('a');
  el.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  el.download=`abonos_${todayISO()}.csv`; el.click();
}
</script>
<script>
// ── Service Worker Registration ────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js', { scope: '/dental-system/' })
      .then(function(reg) {
        console.log('[PWA] SW registered, scope:', reg.scope);
        // Check for updates every 10 minutes
        setInterval(function() { reg.update(); }, 600000);
      })
      .catch(function(err) {
        console.warn('[PWA] SW registration failed:', err.message);
      });
  });
}
</script>
</body>
</html>
