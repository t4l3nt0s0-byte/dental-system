<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
html,body{background:#060D14;color:#E8EAF0;margin:0;padding:0}
@media(min-width:768px){.main{margin-left:240px}}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00C2A8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hersantych">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://*.firebaseio.com https://*.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com https://cdn.jsdelivr.net https://*.gstatic.com;"><link rel="icon" href="favicon.ico?v=2" sizes="any"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="shortcut icon" href="favicon.ico"><link rel="apple-touch-icon" href="favicon.svg"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hersantych · Ofertas & Promociones</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.section-label{font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.oferta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:28px}
.oferta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;position:relative;overflow:hidden;transition:all .2s}
.oferta-card:hover{transform:translateY(-2px);border-color:rgba(244,185,66,.3)}
.oferta-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#FF9A3C)}
.oferta-card.vencida{opacity:.5}.oferta-card.vencida::before{background:var(--border)}
.oferta-badge{position:absolute;top:14px;right:14px;background:var(--gold);color:var(--bg);font-size:.65rem;font-weight:700;padding:4px 10px;border-radius:100px;letter-spacing:.04em}
.oferta-icon{font-size:2rem;margin-bottom:10px}
.oferta-name{font-family:var(--font-display);font-size:1.02rem;color:var(--text);margin-bottom:6px}
.oferta-desc{font-size:.76rem;color:var(--text-muted);line-height:1.5;margin-bottom:12px;min-height:36px}
.oferta-pricing{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.oferta-old{font-family:var(--font-mono);font-size:.82rem;color:var(--text-dim);text-decoration:line-through}
.oferta-new{font-family:var(--font-mono);font-size:1.2rem;font-weight:700;color:var(--gold)}
.oferta-validity{font-size:.68rem;color:var(--text-dim);margin-bottom:12px}
.oferta-actions{display:flex;gap:8px}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<button class="hamburger" id="hamburger">☰</button>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">🎁 Ofertas & Promociones</div>
    <div class="topbar-actions">
      <a href="importar-datos.html" class="btn btn-ghost btn-sm">📥 Importar desde Excel</a>
      <button class="btn btn-primary" id="btnNuevo" style="background:var(--gold);color:#060D14">+ Nueva oferta</button>
      <a href="cotizacion.html" class="btn btn-ghost">📝 Cotizar con descuento</a>
    </div>
  </div>
  <div class="content">
    <div class="section-label" id="labelActivas">Promociones activas</div>
    <div class="oferta-grid" id="actGrid"><div class="loader"><div class="spinner"></div>Cargando...</div></div>
    <div id="vencSection" style="display:none">
      <div class="section-label">Promociones vencidas</div>
      <div class="oferta-grid" id="vencGrid"></div>
    </div>
  </div>
</main>

<!-- MODAL NUEVA OFERTA -->
<div class="modal-overlay" id="modalOferta">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalOfTitle">Nueva Oferta</div>
      <button class="modal-close" onclick="closeModal('modalOferta')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Nombre de la promoción *</label><input class="form-input" id="f-nombre" placeholder="Paquete Blanqueamiento + Limpieza"></div>
      <div class="form-group"><label class="form-label">Descripción</label><textarea class="form-textarea" id="f-desc" placeholder="Detalle de la oferta..." rows="3"></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">Precio original (MXN)</label><input type="number" class="form-input" id="f-original" placeholder="0" oninput="calcDesc()"></div>
        <div class="form-group"><label class="form-label">Precio oferta (MXN)</label><input type="number" class="form-input" id="f-oferta" placeholder="0" oninput="calcDesc()"></div>
      </div>
      <div id="descPreview" style="font-size:.78rem;color:var(--gold);margin-bottom:10px;display:none">💡 Descuento: <span id="descPct"></span>%</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">Vigencia hasta</label><input type="date" class="form-input" id="f-vigencia"></div>
        <div class="form-group"><label class="form-label">Icono / Emoji</label><input class="form-input" id="f-icono" placeholder="✨" maxlength="4"></div>
      </div>
      <div class="form-group"><label class="form-label">Aplica para</label>
        <select class="form-select" id="f-aplica"><option value="">Todos los pacientes</option><option value="nuevos">Solo pacientes nuevos</option><option value="recurrentes">Solo pacientes recurrentes</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalOferta')">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveOf" style="background:var(--gold);color:#060D14">💾 Guardar oferta</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-auth-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-firestore-compat.min.js"></script>
<script src="shared.js"></script>
<script src="dataService.js"></script>
<script>
window.CURRENT_PAGE = 'ofertas';
let allOfertas = [], editId = null;

initSession('any').then(async () => {
  await loadOfertas();
  document.getElementById('btnNuevo').addEventListener('click', openNewModal);
  document.getElementById('btnSaveOf').addEventListener('click', saveOferta);
  // Default vigencia
  const d = new Date(); d.setMonth(d.getMonth()+1);
  document.getElementById('f-vigencia').value = d.toISOString().slice(0,10);
});

async function loadOfertas() {
  allOfertas = await fsGetAll('ofertas', r => r.orderBy('creadoEn','desc'));
  renderOfertas();
}

function renderOfertas() {
  const hoy = todayISO();
  const activas = allOfertas.filter(o=>!o.vigencia||o.vigencia>=hoy);
  const vencidas = allOfertas.filter(o=>o.vigencia&&o.vigencia<hoy);

  document.getElementById('actGrid').innerHTML = activas.length
    ? activas.map(o=>renderCard(o,false)).join('')
    : `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎁</div><div class="empty-title">Sin ofertas activas</div><div class="empty-sub">Crea tu primera promoción</div></div>`;

  if (vencidas.length) {
    document.getElementById('vencSection').style.display='block';
    document.getElementById('vencGrid').innerHTML = vencidas.map(o=>renderCard(o,true)).join('');
  } else { document.getElementById('vencSection').style.display='none'; }
}

function renderCard(o, vencida) {
  const disc = o.original>0&&o.oferta>0 ? Math.round((1-o.oferta/o.original)*100) : 0;
  const venc = o.vigencia ? new Date(o.vigencia+'T12:00').toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'}) : 'Sin fecha';
  const badgeText = o.oferta===0 ? 'GRATIS' : disc>0 ? `-${disc}%` : 'PROMO';
  const badgeBg = o.oferta===0 ? 'var(--teal)' : 'var(--gold)';
  const aplica = o.aplica ? ` · ${o.aplica==='nuevos'?'Solo nuevos':'Solo recurrentes'}` : '';
  return `<div class="oferta-card ${vencida?'vencida':''}">
    <div class="oferta-badge" style="background:${badgeBg}">${badgeText}</div>
    <div class="oferta-icon">${o.icono||'🎁'}</div>
    <div class="oferta-name">${o.nombre||'—'}</div>
    <div class="oferta-desc">${o.descripcion||''}</div>
    <div class="oferta-pricing">
      ${o.original>0?`<span class="oferta-old">${fmtMXN(o.original)}</span>`:''}
      <span class="oferta-new">${o.oferta>0?fmtMXN(o.oferta):'GRATIS'}</span>
    </div>
    <div class="oferta-validity">📅 Válido hasta: ${venc}${aplica}</div>
    <div class="oferta-actions">
      <a href="cotizacion.html" class="btn btn-ghost btn-sm">📝 Cotizar</a>
      ${!vencida?`<button class="btn btn-ghost btn-sm" onclick="editOferta('${o.id}')">✏️</button>`:''}
      ${o.nombre&&o.oferta?`<button class="btn btn-ghost btn-sm" onclick="compartir('${o.nombre}','${o.oferta}')">💬 WA</button>`:''}
      <button class="btn btn-ghost btn-sm" style="color:var(--red);margin-left:auto" onclick="deleteOferta('${o.id}')">🗑️</button>
    </div>
  </div>`;
}

window.calcDesc = function() {
  const orig = parseFloat(document.getElementById('f-original').value)||0;
  const oferta = parseFloat(document.getElementById('f-oferta').value)||0;
  if (orig>0&&oferta>0) {
    const disc = Math.round((1-oferta/orig)*100);
    document.getElementById('descPreview').style.display='block';
    document.getElementById('descPct').textContent=disc;
  } else { document.getElementById('descPreview').style.display='none'; }
};

window.compartir = function(nombre, precio) {
  const msg = `🦷 *Hersantych* · Promoción especial\n\n✨ *${nombre}*\n💰 Precio especial: ${fmtMXN(precio)}\n\n📞 ¡Agenda tu cita hoy!`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
};

function openNewModal() {
  editId=null;
  document.getElementById('modalOfTitle').textContent='Nueva Oferta';
  ['f-nombre','f-desc','f-original','f-oferta','f-icono'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-aplica').value='';
  const d=new Date(); d.setMonth(d.getMonth()+1);
  document.getElementById('f-vigencia').value=d.toISOString().slice(0,10);
  document.getElementById('descPreview').style.display='none';
  openModal('modalOferta');
}

function editOferta(id) {
  editId=id;
  const o=allOfertas.find(x=>x.id===id); if(!o) return;
  document.getElementById('modalOfTitle').textContent='Editar Oferta';
  document.getElementById('f-nombre').value=o.nombre||'';
  document.getElementById('f-desc').value=o.descripcion||'';
  document.getElementById('f-original').value=o.original||0;
  document.getElementById('f-oferta').value=o.oferta||0;
  document.getElementById('f-vigencia').value=o.vigencia||'';
  document.getElementById('f-icono').value=o.icono||'';
  document.getElementById('f-aplica').value=o.aplica||'';
  calcDesc();
  openModal('modalOferta');
}

async function saveOferta() {
  const nombre=document.getElementById('f-nombre').value.trim();
  if(!nombre){showToast('El nombre es obligatorio','error');return;}
  const data={
    nombre,
    descripcion:document.getElementById('f-desc').value.trim(),
    original:parseFloat(document.getElementById('f-original').value)||0,
    oferta:parseFloat(document.getElementById('f-oferta').value)||0,
    vigencia:document.getElementById('f-vigencia').value,
    icono:document.getElementById('f-icono').value||'🎁',
    aplica:document.getElementById('f-aplica').value,
  };
  const btn=document.getElementById('btnSaveOf');
  btn.disabled=true;btn.textContent='Guardando...';
  try{
    if(editId) await fsUpdate('ofertas',editId,data);
    else await fsCreate('ofertas',data);
    showToast(editId?'Oferta actualizada':'Oferta creada','success');
    closeModal('modalOferta');
    await loadOfertas();
  } catch(e) { handleError(e, 'ofertas'); }
  btn.disabled=false;btn.textContent='💾 Guardar oferta';
}

async function deleteOferta(id) {
  if(!await confirmDialog('¿Eliminar esta oferta?')) return;
  try{
    await fsDelete('ofertas',id);
    showToast('Oferta eliminada','success');
    await loadOfertas();
  } catch(e) { handleError(e, 'ofertas'); }
}
</script>
<script>
// ── Service Worker Registration ────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js', { scope: '/dental-system/' })
      .then(function(reg) {
        console.log('[PWA] SW registered, scope:', reg.scope);
        // Check for updates every 10 minutes
        setInterval(function() { reg.update(); }, 600000);
      })
      .catch(function(err) {
        console.warn('[PWA] SW registration failed:', err.message);
      });
  });
}
</script>
</body>
</html>
