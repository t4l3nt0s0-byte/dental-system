<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00C2A8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hersantych">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://*.firebaseio.com https://*.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com;"><link rel="icon" href="favicon.ico?v=2" sizes="any"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="shortcut icon" href="favicon.ico"><link rel="apple-touch-icon" href="favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hersantych · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060D14;--surface:#0C1622;--surface2:#111E2E;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --teal:#00C2A8;--teal-dim:rgba(0,194,168,.12);
  --red:#FF5C5C;--text:#E8F0F8;--muted:rgba(232,240,248,.50);--dim:rgba(232,240,248,.25);
}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,194,168,.08),transparent);
}
.wrap{width:100%;max-width:400px}
.card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px;padding:40px 32px;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
}
.brand{text-align:center;margin-bottom:32px}
.brand-icon{
  width:56px;height:56px;border-radius:14px;
  background:linear-gradient(135deg,#00C2A8,#008F7A);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 12px;
  box-shadow:0 8px 24px rgba(0,194,168,.25);
}
.brand-name{
  font-family:'Instrument Serif',serif;font-size:1.6rem;
  color:var(--text);letter-spacing:-.01em;
}
.brand-name span{color:var(--teal)}
.brand-sub{font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.field{margin-bottom:14px}
.label{display:block;font-size:.67rem;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;padding:11px 13px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;
}
.input:focus{border-color:var(--teal)}
.input::placeholder{color:var(--dim)}
.pw-wrap{position:relative}
.pw-wrap .input{padding-right:42px}
.pw-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:.95rem;padding:4px}
.pw-eye:hover{color:var(--teal)}
.err{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.25);border-radius:8px;padding:10px 13px;font-size:.82rem;color:var(--red);margin-bottom:14px;display:none}
.err.show{display:block}
.btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg,#00C2A8,#00a08a);
  color:#060D14;font-weight:800;font-size:.95rem;border:none;border-radius:10px;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 14px rgba(0,194,168,.28);transition:all .18s;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,194,168,.4)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
.spin{width:16px;height:16px;border:2px solid rgba(6,13,20,.25);border-top-color:#060D14;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn.loading .spin{display:block}
.btn.loading .lbl{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.links{display:flex;justify-content:space-between;margin-top:18px;font-size:.78rem;color:var(--muted)}
.links a{color:var(--teal);text-decoration:none;font-weight:600}
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.ocard{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:26px;max-width:340px;width:100%}
.otitle{font-size:.95rem;font-weight:700;margin-bottom:5px}
.osub{font-size:.78rem;color:var(--muted);margin-bottom:14px;line-height:1.5}
.omsg{font-size:.78rem;margin-top:8px;display:none}
.brow{display:flex;gap:8px;margin-top:14px}
.bsec{flex:1;padding:9px;border-radius:8px;font-size:.82rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s}
.bsec:hover{background:var(--surface2);color:var(--text)}
.bpri{flex:1;padding:9px;border-radius:8px;font-size:.82rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:var(--teal);color:#060D14}
.bpri:hover{opacity:.9}
.footer{text-align:center;margin-top:20px;font-size:.7rem;color:var(--dim)}
.footer a{color:var(--muted);text-decoration:none}
.footer a:hover{color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🦷</div>
      <div class="brand-name">Hersantych<span> Dental</span></div>
      <div class="brand-sub">Sistema de Administración</div>
    </div>
    <div class="err" id="errBox"></div>
    <div class="field">
      <label class="label">Correo electrónico</label>
      <input class="input" id="email" type="email" placeholder="doctor@consultorio.com" autocomplete="email">
    </div>
    <div class="field">
      <label class="label">Contraseña</label>
      <div class="pw-wrap">
        <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
        <button class="pw-eye" id="togglePw" type="button">👁</button>
      </div>
    </div>
    <button class="btn" id="btnLogin" onclick="doLogin()">
      <span class="lbl">Iniciar sesión</span>
      <div class="spin"></div>
    </button>
    <div class="links">
      <a href="#" id="forgotLink">¿Olvidaste tu contraseña?</a>
      <a href="registro.html">Crear cuenta</a>
    </div>
  </div>
  <div class="footer">
    <a href="landing.html">← Inicio</a> &nbsp;·&nbsp; <a href="legal.html">Privacidad</a>
  </div>
</div>

<!-- Reset overlay -->
<div class="overlay" id="resetOverlay">
  <div class="ocard">
    <div class="otitle">🔑 Recuperar contraseña</div>
    <div class="osub">Te enviaremos un enlace para restablecer tu contraseña.</div>
    <div class="field">
      <label class="label">Correo</label>
      <input class="input" id="resetEmail" type="email" placeholder="tucorreo@ejemplo.com">
    </div>
    <div class="omsg" id="resetMsg"></div>
    <div class="brow">
      <button class="bsec" id="resetClose">Cancelar</button>
      <button class="bpri" id="btnReset">Enviar enlace</button>
    </div>
  </div>
</div>

<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ── Firebase init (NO shared.js aquí — login es independiente) ──
var DENTAL_CFG = {
  apiKey:"AIzaSyA4KnJ9y0bbdbwrnd62K5QhZdiMC5-_EV8",
  authDomain:"dental-add.firebaseapp.com",
  projectId:"dental-add",
  storageBucket:"dental-add.firebasestorage.app",
  messagingSenderId:"1350878692",
  appId:"1:1350878692:web:1b11da0a68054d9f2bf3f1"
};
var _app;
try { _app = firebase.app('dental'); }
catch(e) { _app = firebase.initializeApp(DENTAL_CFG,'dental'); }
var _auth = _app.auth();
var _db   = _app.firestore();

// ── NO hay onAuthStateChanged aquí ──────────────────────────────
// El auto-redirect causaba el parpadeo. Login solo hace login.

function showErr(msg){ var b=document.getElementById('errBox'); b.textContent=msg; b.className='err show'; }
function hideErr()   { document.getElementById('errBox').className='err'; }
function setBusy(on) { var btn=document.getElementById('btnLogin'); btn.disabled=on; btn.classList.toggle('loading',on); }

// ── SOLO función de login — sin listeners ────────────────────────
function doLogin() {
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  if(!email||!pass){ showErr('Completa correo y contraseña'); return; }

  // Verificar que Firebase está listo
  if(!_auth){
    showErr('Error: Firebase no inicializado. Recarga la página.');
    return;
  }

  hideErr(); setBusy(true);

  _auth.signInWithEmailAndPassword(email, pass)
    .then(function(cred){
      if(!cred || !cred.user){
        showErr('Error inesperado. Intenta de nuevo.');
        setBusy(false);
        return;
      }
      // Login OK → redirigir al dashboard
      window.location.replace('index.html');
    })
    .catch(function(e){
      console.error('Login error code:', e.code, 'message:', e.message);
      var msgs = {
        'auth/invalid-credential':     'Correo o contraseña incorrectos',
        'auth/user-not-found':         'No existe cuenta con ese correo',
        'auth/wrong-password':         'Contraseña incorrecta',
        'auth/invalid-password':       'Contraseña incorrecta',
        'auth/too-many-requests':      'Demasiados intentos. Espera unos minutos.',
        'auth/network-request-failed': 'Sin conexión a internet. Intenta de nuevo.',
        'auth/invalid-email':          'El correo no tiene formato válido',
        'auth/user-disabled':          'Esta cuenta fue desactivada.',
        'auth/operation-not-allowed':  'Inicio de sesión no habilitado. Contacta al administrador.',
        'auth/internal-error':         'Error interno. Intenta de nuevo.',
      };
      showErr(msgs[e.code] || 'Error ('+e.code+'): '+e.message);
      setBusy(false);
    });
}

// Enter para login
['email','password'].forEach(function(id){
  document.getElementById(id).addEventListener('keydown',function(e){
    if(e.key==='Enter') doLogin();
  });
});

// Toggle contraseña
document.getElementById('togglePw').addEventListener('click',function(){
  var pw=document.getElementById('password');
  pw.type=pw.type==='password'?'text':'password';
  this.textContent=pw.type==='password'?'👁':'🙈';
});

// Recuperar contraseña
document.getElementById('forgotLink').addEventListener('click',function(e){
  e.preventDefault();
  document.getElementById('resetEmail').value=document.getElementById('email').value;
  document.getElementById('resetOverlay').classList.add('open');
});
document.getElementById('resetClose').addEventListener('click',function(){
  document.getElementById('resetOverlay').classList.remove('open');
});
document.getElementById('btnReset').addEventListener('click',function(){
  var email=document.getElementById('resetEmail').value.trim();
  if(!email) return;
  var btn=document.getElementById('btnReset');
  btn.disabled=true;
  _auth.sendPasswordResetEmail(email)
    .then(function(){
      var m=document.getElementById('resetMsg');
      m.textContent='✅ Enlace enviado. Revisa tu correo.';
      m.style.cssText='display:block;color:var(--teal)';
      setTimeout(function(){ document.getElementById('resetOverlay').classList.remove('open'); },2500);
    })
    .catch(function(){
      var m=document.getElementById('resetMsg');
      m.textContent='⚠️ No se pudo enviar. Verifica el correo.';
      m.style.cssText='display:block;color:var(--red)';
    })
    .finally(function(){ btn.disabled=false; });
});
</script>
<script>
// ── Service Worker Registration ────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js', { scope: '/dental-system/' })
      .then(function(reg) {
        console.log('[PWA] SW registered, scope:', reg.scope);
        // Check for updates every 10 minutes
        setInterval(function() { reg.update(); }, 600000);
      })
      .catch(function(err) {
        console.warn('[PWA] SW registration failed:', err.message);
      });
  });
}
</script>
</body>
</html>
