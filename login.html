<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hersantych Dental · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060D14;--surface:#0C1622;--surface2:#111E2E;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --teal:#00C2A8;--teal-dim:rgba(0,194,168,.12);--teal-glow:rgba(0,194,168,.22);
  --red:#FF5C5C;--text:#E8F0F8;
  --muted:rgba(232,240,248,.50);--dim:rgba(232,240,248,.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,194,168,.08),transparent);
  pointer-events:none;
}

.wrap{position:relative;z-index:1;width:100%;max-width:410px;padding:20px}

.card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:24px;padding:40px 36px;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
}

/* Brand */
.brand{text-align:center;margin-bottom:32px}
.brand-icon{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(135deg,var(--teal),#008F7A);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 14px;
  box-shadow:0 8px 24px var(--teal-glow);
}
.brand-name{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:1.7rem;color:var(--text);
}
.brand-name span{color:var(--teal)}
.brand-sub{
  font-size:.72rem;color:var(--muted);
  letter-spacing:.12em;text-transform:uppercase;margin-top:5px;
}

/* Form */
.field{margin-bottom:16px}
.label{
  display:block;font-size:.68rem;font-weight:700;
  color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:6px;
}
.input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.9rem;
  outline:none;transition:all .2s;
}
.input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim)}
.input::placeholder{color:var(--dim)}

.pw-wrap{position:relative}
.pw-wrap .input{padding-right:44px}
.pw-eye{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);
  font-size:1rem;padding:4px;line-height:1;
}
.pw-eye:hover{color:var(--teal)}

/* Error */
.error{
  background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.25);
  border-radius:8px;padding:10px 14px;
  font-size:.82rem;color:var(--red);
  margin-bottom:16px;display:none;
}
.error.show{display:block}

/* Button */
.btn-login{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--teal),#00a08a);
  color:#060D14;font-weight:800;font-size:.95rem;
  border:none;border-radius:11px;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px var(--teal-glow);
  transition:all .2s;
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(0,194,168,.4)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.spin{
  width:17px;height:17px;border:2px solid rgba(6,13,20,.25);
  border-top-color:#060D14;border-radius:50%;
  animation:spin .7s linear infinite;display:none;flex-shrink:0;
}
.btn-login.loading .spin{display:block}
.btn-login.loading .btn-lbl{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* Links */
.links{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:20px;font-size:.78rem;color:var(--muted);
}
.links a{color:var(--teal);text-decoration:none;font-weight:600}
.links a:hover{text-decoration:underline}

/* Reset overlay */
.overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:20px;
}
.overlay.open{display:flex}
.overlay-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:28px;max-width:360px;width:100%;
}
.overlay-title{font-size:1rem;font-weight:700;margin-bottom:6px}
.overlay-sub{font-size:.8rem;color:var(--muted);margin-bottom:18px;line-height:1.5}
.overlay-msg{font-size:.8rem;margin-top:10px;display:none}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-secondary{
  flex:1;padding:10px;border-radius:9px;font-size:.85rem;font-weight:600;
  font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);
  background:transparent;color:var(--muted);transition:all .15s;
}
.btn-secondary:hover{background:var(--surface2);color:var(--text)}
.btn-primary-sm{
  flex:1;padding:10px;border-radius:9px;font-size:.85rem;font-weight:700;
  font-family:'DM Sans',sans-serif;cursor:pointer;border:none;
  background:var(--teal);color:#060D14;transition:all .15s;
}
.btn-primary-sm:hover{opacity:.9}

/* Footer */
.footer{
  text-align:center;margin-top:24px;
  font-size:.72rem;color:var(--dim);
}
.footer a{color:var(--muted);text-decoration:none}
.footer a:hover{color:var(--teal)}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">🦷</div>
      <div class="brand-name">Hersantych<span> Dental</span></div>
      <div class="brand-sub">Sistema Integral de Administración</div>
    </div>

    <!-- Error -->
    <div class="error" id="errBox"></div>

    <!-- Email -->
    <div class="field">
      <label class="label" for="email">Correo electrónico</label>
      <input class="input" id="email" type="email"
        placeholder="doctor@consultorio.com" autocomplete="email">
    </div>

    <!-- Password -->
    <div class="field">
      <label class="label" for="password">Contraseña</label>
      <div class="pw-wrap">
        <input class="input" id="password" type="password"
          placeholder="••••••••" autocomplete="current-password">
        <button class="pw-eye" id="togglePw" type="button" tabindex="-1">👁</button>
      </div>
    </div>

    <!-- Button -->
    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <span class="btn-lbl">Iniciar sesión</span>
      <div class="spin"></div>
    </button>

    <!-- Links -->
    <div class="links">
      <a href="#" id="forgotLink">¿Olvidaste tu contraseña?</a>
      <a href="registro.html">Crear cuenta</a>
    </div>

  </div>

  <div class="footer">
    <a href="landing.html">← Volver al inicio</a>
    &nbsp;·&nbsp;
    <a href="legal.html">Aviso de privacidad</a>
  </div>
</div>

<!-- Reset overlay -->
<div class="overlay" id="resetOverlay">
  <div class="overlay-card">
    <div class="overlay-title">🔑 Recuperar contraseña</div>
    <div class="overlay-sub">Te enviaremos un enlace para restablecer tu contraseña.</div>
    <div class="field">
      <label class="label">Correo electrónico</label>
      <input class="input" id="resetEmail" type="email" placeholder="tucorreo@ejemplo.com">
    </div>
    <div class="overlay-msg" id="resetMsg"></div>
    <div class="btn-row">
      <button class="btn-secondary" id="resetClose">Cancelar</button>
      <button class="btn-primary-sm" id="btnReset">Enviar enlace</button>
    </div>
  </div>
</div>

<!-- Firebase v9 compat (mismo que shared.js) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ── Firebase ──────────────────────────────────────────────
var DENTAL_CFG = {
  apiKey:"AIzaSyA4KnJ9y0bbdbwrnd62K5QhZdiMC5-_EV8",
  authDomain:"dental-add.firebaseapp.com",
  projectId:"dental-add",
  storageBucket:"dental-add.firebasestorage.app",
  messagingSenderId:"1350878692",
  appId:"1:1350878692:web:1b11da0a68054d9f2bf3f1"
};

// Inicializar sin duplicar
var _app, _auth, _db;
try {
  _app  = firebase.app('dental');
} catch(e) {
  _app  = firebase.initializeApp(DENTAL_CFG, 'dental');
}
_auth = _app.auth();
_db   = _app.firestore();

// ── Auto-redirect si ya está logueado ─────────────────────
// Verificar silenciosamente — si hay sesión activa ir al dashboard
// Solo una vez, sin disparar múltiples veces
var _checked = false;
_auth.onAuthStateChanged(function(user) {
  if (_checked) return;
  _checked = true;
  if (user) {
    // Usuario ya logueado → verificar que existe en Firestore
    _db.collection('usuarios').doc(user.uid).get()
      .then(function(snap) {
        if (snap.exists && snap.data().activo !== false) {
          // Sesión válida → ir al dashboard SIN crear loop
          window.location.replace('index.html');
        }
        // Si no existe en Firestore: quedarse en login
      })
      .catch(function(e) {
        // Error de red o permisos → quedarse en login, no redirigir
        console.warn('Auth check:', e.message);
      });
  }
  // Si no hay usuario: mostrar login normalmente
});

// ── Helpers ────────────────────────────────────────────────
function showErr(msg) {
  var b = document.getElementById('errBox');
  b.textContent = msg; b.className = 'error show';
}
function hideErr() {
  document.getElementById('errBox').className = 'error';
}
function setBusy(on) {
  var btn = document.getElementById('btnLogin');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

// ── Login ──────────────────────────────────────────────────
function doLogin() {
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  if (!email || !pass) { showErr('Completa correo y contraseña'); return; }
  hideErr(); setBusy(true);

  _auth.signInWithEmailAndPassword(email, pass).then(function(cred) {
    return _db.collection('usuarios').doc(cred.user.uid).get();
  }).then(function(snap) {
    if (!snap.exists) {
      _auth.signOut();
      showErr('Usuario no encontrado. Contacta al administrador.');
      setBusy(false); return;
    }
    var data = snap.data();
    if (data.activo === false) {
      _auth.signOut();
      showErr('Tu cuenta está desactivada. Contacta al administrador.');
      setBusy(false); return;
    }
    // Éxito → ir al dashboard
    window.location.replace('index.html');
  }).catch(function(e) {
    var msgs = {
      'auth/invalid-credential':    'Correo o contraseña incorrectos',
      'auth/user-not-found':        'No existe cuenta con ese correo',
      'auth/wrong-password':        'Contraseña incorrecta',
      'auth/too-many-requests':     'Demasiados intentos. Espera unos minutos.',
      'auth/network-request-failed':'Sin conexión a internet. Intenta de nuevo.',
      'auth/invalid-email':         'Correo electrónico no válido',
    };
    showErr(msgs[e.code] || 'Error: ' + e.message);
    setBusy(false);
  });
}

// ── Toggle password ────────────────────────────────────────
document.getElementById('togglePw').addEventListener('click', function() {
  var pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  this.textContent = pw.type === 'password' ? '👁' : '🙈';
});

// ── Enter key ──────────────────────────────────────────────
['email','password'].forEach(function(id) {
  document.getElementById(id).addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
});

// ── Forgot password ────────────────────────────────────────
document.getElementById('forgotLink').addEventListener('click', function(e) {
  e.preventDefault();
  document.getElementById('resetEmail').value = document.getElementById('email').value;
  document.getElementById('resetOverlay').classList.add('open');
});
document.getElementById('resetClose').addEventListener('click', function() {
  document.getElementById('resetOverlay').classList.remove('open');
});
document.getElementById('btnReset').addEventListener('click', function() {
  var email = document.getElementById('resetEmail').value.trim();
  if (!email) return;
  var btn = document.getElementById('btnReset');
  btn.disabled = true;
  _auth.sendPasswordResetEmail(email).then(function() {
    var msg = document.getElementById('resetMsg');
    msg.textContent = '✅ Enlace enviado. Revisa tu correo.';
    msg.style.cssText = 'display:block;color:var(--teal)';
    setTimeout(function(){
      document.getElementById('resetOverlay').classList.remove('open');
    }, 2500);
  }).catch(function() {
    var msg = document.getElementById('resetMsg');
    msg.textContent = '⚠️ No se pudo enviar. Verifica el correo.';
    msg.style.cssText = 'display:block;color:var(--red)';
  }).finally(function(){ btn.disabled = false; });
});
</script>
</body>
</html>
