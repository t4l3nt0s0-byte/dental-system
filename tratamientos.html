<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="shortcut icon" href="favicon.svg"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DentalOS · Tratamientos</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filters .search-wrap{flex:1;min-width:180px}
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.sum-val{font-family:var(--font-mono);font-size:1.3rem;font-weight:700;margin-bottom:3px}
.sum-label{font-size:.72rem;color:var(--text-muted)}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<button class="hamburger" id="hamburger">☰</button>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">🦷 Tratamientos</div>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="btnNuevo">+ Nuevo tratamiento</button>
    </div>
  </div>
  <div class="content">
    <div class="summary-strip" id="summaryStrip">
      <div class="sum-card"><div class="spinner" style="margin:8px auto"></div></div>
      <div class="sum-card"></div><div class="sum-card"></div>
    </div>
    <div class="filters">
      <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="searchInput" placeholder="Buscar por paciente o tratamiento..."></div>
      <select class="form-select" id="filterEstado" style="width:160px">
        <option value="">Todos los estados</option>
        <option>Pendiente</option><option>Abonando</option><option>Liquidado</option><option>Cancelado</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="btnExport">📥 CSV</button>
    </div>
    <div class="table-wrap"><table id="tratTable">
      <thead><tr><th>Paciente</th><th>Tratamiento</th><th>Descripción</th><th>Inicio</th><th>Costo</th><th>Abonado</th><th>Saldo</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody id="tratBody"><tr><td colspan="9" style="text-align:center;padding:40px"><div class="loader"><div class="spinner"></div>Cargando...</div></td></tr></tbody>
    </table></div>
  </div>
</main>

<!-- MODAL NUEVO/EDITAR -->
<div class="modal-overlay" id="modalTrat">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="modalTratTitle">Nuevo Tratamiento</div>
      <button class="modal-close" onclick="closeModal('modalTrat')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Paciente *</label>
          <select class="form-select" id="f-paciente"><option value="">Seleccionar paciente...</option></select>
        </div>
        <div class="form-group full">
          <label class="form-label">Tratamiento *</label>
          <select class="form-select" id="f-tratamiento" onchange="autoFillPrecio()"><option value="">Seleccionar tratamiento...</option></select>
        </div>
        <div class="form-group full"><label class="form-label">Descripción / Observaciones</label><textarea class="form-textarea" id="f-desc" placeholder="Pieza dental, detalles del procedimiento..."></textarea></div>
        <div class="form-group"><label class="form-label">Fecha inicio</label><input type="date" class="form-input" id="f-finicio"></div>
        <div class="form-group"><label class="form-label">Fecha término estimada</label><input type="date" class="form-input" id="f-ftermino"></div>
        <div class="form-group"><label class="form-label">Costo total (MXN)</label><input type="number" class="form-input" id="f-costo" min="0" step="0.01" onchange="recalc()"></div>
        <div class="form-group"><label class="form-label">Incluye IVA (16%)</label>
          <select class="form-select" id="f-iva" onchange="recalc()"><option value="no">Sin IVA</option><option value="si">Con IVA incluido</option><option value="agregar">Agregar IVA al precio</option></select>
        </div>
        <div class="form-group"><label class="form-label">Total con IVA</label><input type="text" class="form-input" id="f-total-iva" readonly style="color:var(--teal)"></div>
        <div class="form-group"><label class="form-label">Anticipo / Primer pago (MXN)</label><input type="number" class="form-input" id="f-anticipo" min="0" step="0.01" onchange="recalc()"></div>
        <div class="form-group"><label class="form-label">Estado</label>
          <select class="form-select" id="f-estado"><option>Pendiente</option><option>Abonando</option><option>Liquidado</option><option>Cancelado</option></select>
        </div>
      </div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:12px;font-size:.82rem;color:var(--text-muted)">
        Saldo calculado: <span id="f-saldo-preview" style="font-family:var(--font-mono);color:var(--text);font-weight:700">—</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalTrat')">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveTrat">💾 Guardar tratamiento</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
window.CURRENT_PAGE = 'tratamientos';
let allTrat = [], allPacientes = [], allCatalogo = [], editId = null;

initSession('any').then(async session => {
  if (!session) return;
  // Pre-fill if URL has exp param
  const expId = new URLSearchParams(location.search).get('exp');
  await Promise.all([loadPacientes(), loadCatalogo(), loadTrat()]);
  if (expId) {
    document.getElementById('searchInput').value = '';
    const px = allPacientes.find(p=>p.id===expId);
    if(px) document.getElementById('searchInput').value = px.nombre||'';
    renderTable();
  }
  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('filterEstado').addEventListener('change', renderTable);
  document.getElementById('btnNuevo').addEventListener('click', () => openNewModal(expId));
  document.getElementById('btnSaveTrat').addEventListener('click', saveTrat);
  document.getElementById('btnExport').addEventListener('click', exportCSV);
  document.getElementById('f-finicio').value = todayISO();
});

async function loadTrat() {
  allTrat = await fsGetAll('tratamientos');
  renderTable();
  renderSummary();
}
async function loadPacientes() {
  allPacientes = await fsGetAll('pacientes', r => r.orderBy('nombre','asc'));
  const sel = document.getElementById('f-paciente');
  sel.innerHTML = '<option value="">Seleccionar paciente...</option>' +
    allPacientes.map(p=>`<option value="${p.id}" data-nombre="${p.nombre||''}">${p.nombre||p.id} (${p.expediente||p.id})</option>`).join('');
}
async function loadCatalogo() {
  allCatalogo = await fsGetAll('catalogo', r => r.orderBy('tratamiento','asc'));
  const sel = document.getElementById('f-tratamiento');
  sel.innerHTML = '<option value="">Seleccionar tratamiento...</option>' +
    allCatalogo.map(c=>`<option value="${c.id}" data-sugerido="${c.sugerido||0}">${c.tratamiento}</option>`).join('') +
    '<option value="_custom">✏️ Otro (escribir)</option>';
}

window.autoFillPrecio = function() {
  const sel = document.getElementById('f-tratamiento');
  const opt = sel.options[sel.selectedIndex];
  if (opt && opt.dataset.sugerido) {
    document.getElementById('f-costo').value = opt.dataset.sugerido;
    recalc();
  }
  if (sel.value === '_custom') {
    const nombre = prompt('Nombre del tratamiento:');
    if (nombre) { sel.innerHTML += `<option value="_c_${nombre}" selected>${nombre}</option>`; sel.value = `_c_${nombre}`; }
  }
};

window.recalc = function() {
  const costo = parseFloat(document.getElementById('f-costo').value)||0;
  const iva = document.getElementById('f-iva').value;
  let total = costo;
  if (iva === 'agregar') total = costo * 1.16;
  document.getElementById('f-total-iva').value = iva === 'no' ? '—' : fmtMXN(total);
  const anticipo = parseFloat(document.getElementById('f-anticipo').value)||0;
  const saldo = total - anticipo;
  document.getElementById('f-saldo-preview').textContent = fmtMXN(Math.max(0, saldo));
  if (anticipo >= total && total > 0) document.getElementById('f-estado').value = 'Liquidado';
  else if (anticipo > 0) document.getElementById('f-estado').value = 'Abonando';
  else document.getElementById('f-estado').value = 'Pendiente';
};

function renderSummary() {
  const totalFac  = allTrat.reduce((s,t)=>s+Number(t.costo||0),0);
  const totalCob  = allTrat.reduce((s,t)=>s+Number(t.abonado||0),0);
  const totalPend = allTrat.reduce((s,t)=>s+Number(t.saldo||0),0);
  document.getElementById('summaryStrip').innerHTML = `
    <div class="sum-card"><div class="sum-val" style="color:var(--blue)">${fmtMXN(totalFac)}</div><div class="sum-label">💵 Facturación total</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--teal)">${fmtMXN(totalCob)}</div><div class="sum-label">✅ Total cobrado</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--gold)">${fmtMXN(totalPend)}</div><div class="sum-label">❗ Saldo pendiente</div></div>`;
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const e = document.getElementById('filterEstado').value;
  const filtered = allTrat.filter(t =>
    (!q || t.paciente?.toLowerCase().includes(q) || t.tratamiento?.toLowerCase().includes(q) || t.descripcion?.toLowerCase().includes(q)) &&
    (!e || t.estado === e)
  );
  const estadoClass = {Liquidado:'badge-green',Abonando:'badge-gold',Pendiente:'badge-red',Cancelado:'badge-purple'};
  const tbody = document.getElementById('tratBody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">🦷</div><div class="empty-title">Sin tratamientos</div><div class="empty-sub">Registra el primer tratamiento</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(t => `<tr>
    <td><div style="font-weight:600;color:var(--text)">${t.paciente||'—'}</div></td>
    <td>${t.tratamiento||'—'}</td>
    <td style="max-width:160px;color:var(--text-dim);font-size:.77rem">${t.descripcion||'—'}</td>
    <td>${t.fechaInicio||'—'}</td>
    <td style="font-family:var(--font-mono)">${fmtMXN(t.costo)}</td>
    <td style="font-family:var(--font-mono);color:var(--green)">${fmtMXN(t.abonado)}</td>
    <td style="font-family:var(--font-mono);color:var(--red)">${fmtMXN(t.saldo)}</td>
    <td><span class="badge ${estadoClass[t.estado]||'badge-blue'}">${t.estado||'—'}</span></td>
    <td>
      <div style="display:flex;gap:5px">
        <button class="btn btn-ghost btn-sm" onclick="editTrat('${t.id}')">✏️</button>
        <a href="abonos.html?trat=${t.id}" class="btn btn-ghost btn-sm" title="Registrar abono">💰</a>
        ${t.expId ? `<button class="btn btn-ghost btn-sm" onclick="whatsapp(getPxTel('${t.expId}'),'Hola ${(t.paciente||'').split(' ')[0]}, te recordamos que tienes un saldo pendiente de ${fmtMXN(t.saldo)} en DentalOS.')" title="WhatsApp">💬</button>` : ''}
        <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteTrat('${t.id}')">🗑️</button>
      </div>
    </td>
  </tr>`).join('');
}

function getPxTel(expId) {
  const p = allPacientes.find(x=>x.id===expId);
  return p?.tel||'';
}

function openNewModal(expId) {
  editId = null;
  document.getElementById('modalTratTitle').textContent = 'Nuevo Tratamiento';
  document.getElementById('f-costo').value = '';
  document.getElementById('f-anticipo').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-ftermino').value = '';
  document.getElementById('f-iva').value = 'no';
  document.getElementById('f-total-iva').value = '';
  document.getElementById('f-saldo-preview').textContent = '—';
  document.getElementById('f-estado').value = 'Pendiente';
  document.getElementById('f-tratamiento').value = '';
  document.getElementById('f-finicio').value = todayISO();
  if (expId) document.getElementById('f-paciente').value = expId;
  else document.getElementById('f-paciente').value = '';
  openModal('modalTrat');
}

function editTrat(id) {
  editId = id;
  const t = allTrat.find(x=>x.id===id); if(!t) return;
  document.getElementById('modalTratTitle').textContent = 'Editar Tratamiento';
  document.getElementById('f-paciente').value = t.expId||'';
  // Match catalogo
  const cat = allCatalogo.find(c=>c.tratamiento===t.tratamiento);
  if(cat) document.getElementById('f-tratamiento').value = cat.id;
  else {
    const opt = document.getElementById('f-tratamiento');
    opt.innerHTML += `<option value="_c_${t.tratamiento}" selected>${t.tratamiento}</option>`;
    opt.value = `_c_${t.tratamiento}`;
  }
  document.getElementById('f-desc').value = t.descripcion||'';
  document.getElementById('f-finicio').value = t.fechaInicio||'';
  document.getElementById('f-ftermino').value = t.fechaTermino||'';
  document.getElementById('f-costo').value = t.costo||0;
  document.getElementById('f-iva').value = t.tieneIva||'no';
  document.getElementById('f-anticipo').value = t.abonado||0;
  document.getElementById('f-estado').value = t.estado||'Pendiente';
  recalc();
  openModal('modalTrat');
}

async function saveTrat() {
  const expId = document.getElementById('f-paciente').value;
  const tratSel = document.getElementById('f-tratamiento');
  const tratNombre = tratSel.options[tratSel.selectedIndex]?.text?.replace('✏️ ','').replace('Otro (escribir)','') || '';
  if (!expId) { showToast('Selecciona un paciente','error'); return; }
  if (!tratNombre) { showToast('Selecciona un tratamiento','error'); return; }
  const px = allPacientes.find(p=>p.id===expId);
  const costo = parseFloat(document.getElementById('f-costo').value)||0;
  const tieneIva = document.getElementById('f-iva').value;
  const costoFinal = tieneIva === 'agregar' ? costo * 1.16 : costo;
  const anticipo = parseFloat(document.getElementById('f-anticipo').value)||0;
  const saldo = Math.max(0, costoFinal - anticipo);
  const data = {
    expId, paciente: px?.nombre||'—',
    tratamiento: tratNombre,
    descripcion: document.getElementById('f-desc').value.trim(),
    fechaInicio: document.getElementById('f-finicio').value,
    fechaTermino: document.getElementById('f-ftermino').value,
    costo: costoFinal, tieneIva,
    abonado: anticipo, saldo,
    estado: document.getElementById('f-estado').value,
  };
  const btn = document.getElementById('btnSaveTrat');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    if (editId) {
      await fsUpdate('tratamientos', editId, data);
    } else {
      const id = await fsCreate('tratamientos', data);
      // Si hay anticipo, registrar como abono
      if (anticipo > 0) {
        await fsCreate('abonos', {
          tratId: id, expId,
          paciente: px?.nombre||'—',
          tratamiento: tratNombre,
          monto: anticipo, forma: 'Efectivo',
          fecha: todayISO(), concepto: 'Anticipo',
        });
      }
    }
    showToast(editId ? 'Tratamiento actualizado' : 'Tratamiento registrado', 'success');
    closeModal('modalTrat');
    await loadTrat();
  } catch(e) { handleError(e, 'tratamientos'); }
  btn.disabled = false; btn.textContent = '💾 Guardar tratamiento';
}

async function deleteTrat(id) {
  if (!await confirmDialog('¿Eliminar este tratamiento? También se eliminarán sus abonos.')) return;
  try {
    // delete related abonos
    const abonos = await fsGetAll('abonos', r => r.where('tratId','==',id));
    await Promise.all(abonos.map(a => fsDelete('abonos', a.id)));
    await fsDelete('tratamientos', id);
    showToast('Tratamiento eliminado','success');
    audit('DELETE_TRATAMIENTO',{id:id||''});
    await loadTrat();
  } catch(e) { handleError(e, 'tratamientos'); }
}

function exportCSV() {
  const headers = ['Paciente','Tratamiento','Descripción','Fecha Inicio','Costo','Abonado','Saldo','Estado'];
  const rows = allTrat.map(t=>[t.paciente,t.tratamiento,t.descripcion,t.fechaInicio,t.costo,t.abonado,t.saldo,t.estado].map(v=>`"${v||''}"`).join(','));
  const csv = [headers.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`tratamientos_${todayISO()}.csv`; a.click();
}
</script>
</body>
</html>
