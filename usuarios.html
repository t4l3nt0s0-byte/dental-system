<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://*.firebaseio.com https://*.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com;"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="shortcut icon" href="favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DentalOS · Usuarios & Roles</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
/* ── USER GRID ─────────────────────────────────────────── */
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:box-shadow .15s}
.user-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.15)}
.user-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.user-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:#fff;flex-shrink:0}
.user-name{font-size:.92rem;font-weight:700;color:var(--text)}
.user-email{font-size:.72rem;color:var(--text-muted)}
.user-row{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--text-muted);margin-bottom:6px;flex-wrap:wrap}
.user-perms{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.perm-pill{font-size:.6rem;font-weight:700;background:rgba(0,194,168,.12);color:var(--teal);border:1px solid rgba(0,194,168,.25);border-radius:20px;padding:2px 8px}
.user-actions{display:flex;align-items:center;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;border-radius:20px;padding:2px 10px}
.badge-gold{background:rgba(244,185,66,.15);color:#F4B942;border:1px solid rgba(244,185,66,.3)}
.badge-teal{background:rgba(0,194,168,.12);color:var(--teal);border:1px solid rgba(0,194,168,.25)}
.badge-blue{background:rgba(74,158,255,.12);color:var(--blue);border:1px solid rgba(74,158,255,.25)}
.badge-purple{background:rgba(160,120,255,.12);color:#a078ff;border:1px solid rgba(160,120,255,.25)}
.badge-green{background:rgba(52,211,153,.12);color:#34D399;border:1px solid rgba(52,211,153,.25)}
.badge-red{background:rgba(255,92,92,.12);color:#FF5C5C;border:1px solid rgba(255,92,92,.25)}
/* Perms grid in modal */
.perms-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.perm-item{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.78rem;cursor:pointer;transition:background .12s,border-color .12s;user-select:none;box-sizing:border-box}
.perm-item:hover:not(.disabled-perm){background:var(--surface);border-color:var(--teal)}
.perm-item.checked{background:rgba(0,194,168,.1);border-color:rgba(0,194,168,.4)}
.perm-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal);cursor:pointer;flex-shrink:0;pointer-events:none}
.perm-item.disabled-perm{opacity:.5;cursor:not-allowed}
.perm-item.disabled-perm:hover{background:var(--surface2);border-color:var(--border)}
/* Empty state */
.empty-state{text-align:center;padding:48px 20px;grid-column:1/-1}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-title{font-size:1rem;font-weight:600;color:var(--text-muted)}
/* Section header */
.section-label{font-size:.58rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<button class="hamburger" id="hamburger">☰</button>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">👥 Usuarios & Roles</div>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="btnNuevo">+ Nuevo usuario</button>
    </div>
  </div>
  <div class="content">
    <div class="user-grid" id="userGrid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">⏳</div>
        <div class="empty-title">Cargando usuarios…</div>
      </div>
    </div>
  </div>
</main>

<!-- ══ MODAL USUARIO ══════════════════════════════════════ -->
<div class="modal-overlay" id="modalUser">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <div class="modal-title" id="modalUserTitle">Nuevo Usuario</div>
      <button class="modal-close" onclick="closeModal('modalUser')">✕</button>
    </div>
    <div class="modal-body" style="max-height:75vh;overflow-y:auto">
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Nombre completo *</label>
          <input class="form-input" id="f-nombre" placeholder="Dr. Nombre Apellido">
        </div>
        <div class="form-group full">
          <label class="form-label">Correo electrónico *</label>
          <input type="email" class="form-input" id="f-email" placeholder="usuario@clinica.com">
        </div>
        <div class="form-group" id="passGroup">
          <label class="form-label">Contraseña temporal *</label>
          <input type="password" class="form-input" id="f-pass" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
          <label class="form-label">Rol *</label>
          <select class="form-select" id="f-rol" onchange="onRolChange()">
            <option value="recepcion">Recepción</option>
            <option value="asistente">Asistente</option>
            <option value="doctor">Doctor</option>
            <option value="admin">Administrador</option>
            <option value="director" id="optDirector" style="display:none">🏢 Director Regional</option>
            <option value="owner" id="optOwner" style="display:none">👑 Propietario</option>
          </select>
          <div id="rolDesc" style="font-size:.7rem;color:var(--text-muted);margin-top:4px;min-height:1.2em"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-select" id="f-activo">
            <option value="true">Activo</option>
            <option value="false">Inactivo</option>
          </select>
        </div>
      </div>

      <!-- Permisos -->
      <div style="margin-top:16px">
        <div class="section-label">🔐 Permisos de acceso</div>
        <div id="adminPermsNote" style="display:none;font-size:.72rem;color:var(--text-muted);margin-bottom:8px">
          Como administrador tienes acceso a todo — puedes personalizar los permisos de este usuario individualmente.
        </div>
        <div id="adminWarning" style="display:none;font-size:.72rem;background:rgba(244,185,66,.1);border:1px solid rgba(244,185,66,.3);color:#F4B942;border-radius:8px;padding:8px 12px;margin-bottom:8px">
          ⭐ El rol Admin tiene acceso total a todas las páginas.
        </div>
        <div class="perms-grid" id="permsGrid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalUser')">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveUser" onclick="saveUser()">💾 Guardar usuario</button>
    </div>
  </div>
</div>

<!-- ══ MODAL CONTRASEÑA ═══════════════════════════════════ -->
<div class="modal-overlay" id="modalPass">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title">🔑 Cambiar contraseña</div>
      <button class="modal-close" onclick="closeModal('modalPass')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input class="form-input" id="pass-usuario" readonly style="background:var(--surface2)">
      </div>
      <div class="form-group">
        <label class="form-label">Nueva contraseña *</label>
        <input type="password" class="form-input" id="pass-nueva" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contraseña *</label>
        <input type="password" class="form-input" id="pass-confirm" placeholder="Repetir contraseña">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalPass')">Cancelar</button>
      <button class="btn btn-primary" onclick="savePass()">🔑 Actualizar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
window.CURRENT_PAGE = 'usuarios';
let allUsers = [], editId = null, changePassUid = null;

// ── TODAS LAS PÁGINAS ASIGNABLES A ROLES ───────────────────────────
// No incluir páginas exclusivas de admin (planes, configuracion, usuarios, importar-datos)
// El admin siempre tiene acceso a todo — esta lista es solo para otros roles
const ALL_PAGES = {
  // Operación diaria
  agenda:          '📅 Agenda',
  pacientes:       '👤 Pacientes / Expedientes',
  tratamientos:    '🦷 Tratamientos',
  abonos:          '💰 Abonos / Pagos',
  cotizacion:      '📝 Cotizaciones',
  catalogo:        '📚 Catálogo & Precios',
  expediente:      '📋 Expediente',
  recetas:         '💊 Recetas médicas',
  // Clínica
  odontograma:     '🦷 Odontograma',
  inventario:      '🏥 Inventario',
  recordatorios:   '🔔 Recordatorios WA',
  // Finanzas
  'corte-caja':    '🧾 Corte de caja',
  'estado-cuenta': '📄 Estado de cuenta',
  recibo:          '🧾 Recibos',
  // Reportes
  metricas:        '📈 Métricas',
  reportes:        '📊 Reportes',
  ofertas:         '🎁 Ofertas & Promos',
  // Herramientas
  busqueda:        '🔍 Búsqueda global',
};

// Permisos por defecto según rol — claves deben coincidir con PAGE_PERM_MAP en shared.js
const ROL_DEFAULT_PERMS = {
  // Propietario: acceso total + grupo (multi-sucursal)
  owner:     [...Object.keys(ALL_PAGES), 'usuarios','configuracion','importar','planes','grupo','auditoria'],
  // Director regional: acceso operativo completo sin planes/billing
  director:  [...Object.keys(ALL_PAGES), 'usuarios','configuracion','grupo','auditoria'],
  // Admin: acceso total a su sucursal
  admin:     [...Object.keys(ALL_PAGES), 'usuarios','configuracion','importar','planes','auditoria'],
  // Doctor: clínica completa + recetas
  doctor:    ['agenda','pacientes','tratamientos','odontograma',
               'expediente','recetas','inventario'],
  // Recepción: operación y finanzas del día
  recepcion: ['agenda','pacientes','cotizacion','abonos','catalogo',
               'recordatorios','expediente','recibo','busqueda',
               'corte-caja','estado-cuenta'],
  // Asistente: mínimo operativo
  asistente: ['agenda','pacientes','busqueda'],
};

const ROL_COLORS = {
  owner:'#E24B4A', director:'#FF8C00', admin:'#F4B942',
  doctor:'#00C2A8', recepcion:'#4A9EFF', asistente:'#a078ff'
};
const ROL_BADGE = {
  owner:'badge-red', director:'badge-orange', admin:'badge-gold',
  doctor:'badge-teal', recepcion:'badge-blue', asistente:'badge-purple'
};

// ── INIT ──────────────────────────────────────────────────────
initSession('usuarios').then(async session => {
  if(!session) return;
  document.getElementById('btnNuevo').onclick = openNewModal;
  await loadUsers();
});

async function loadUsers(){
  try{
    const snap = await db.collection('usuarios')
      .where('clinicaId','==',SESSION.clinica.id).get();
    allUsers = snap.docs.map(d=>({id:d.id,...d.data()}));

    // Normalizar: si un usuario no tiene permisos guardados,
    // asignar los defaults de su rol en Firebase (una sola vez)
    const updates = allUsers
      .filter(u => u.rol !== 'admin' && (!u.permisos || u.permisos.length === 0))
      .map(u => db.collection('usuarios').doc(u.id).update({
          permisos: ROL_DEFAULT_PERMS[u.rol] || [],
          actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => { u.permisos = ROL_DEFAULT_PERMS[u.rol] || []; })
         .catch(()=>{}) // silencioso si no hay permisos de escritura
      );
    if(updates.length) await Promise.all(updates);

    renderGrid();
  } catch(e) { handleError(e, 'usuarios'); }
}

// ── RENDER GRID ───────────────────────────────────────────────
function renderGrid(){
  const grid = document.getElementById('userGrid');
  const isAdmin = SESSION?.user?.rol === 'admin' || SESSION?.user?.rol === 'owner';
  const myUid   = SESSION?.user?.uid;

  if(!allUsers.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">👥</div><div class="empty-title">Sin usuarios registrados</div>
    </div>`;
    return;
  }

  grid.innerHTML = allUsers.map(u=>{
    const ini    = (u.nombre||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const rolLbl = ROLES[u.rol]?.label || u.rol || '—';
    const color  = ROL_COLORS[u.rol]||'#6B7280';
    const badge  = ROL_BADGE[u.rol]||'badge-blue';
    const isSelf = u.id === myUid;
    const isUserAdmin = u.rol === 'admin';

    // Permisos efectivos: los guardados en Firebase o los defaults del rol
    const perms = (u.permisos && u.permisos.length > 0)
      ? u.permisos
      : (ROL_DEFAULT_PERMS[u.rol] || []);

    // Mostrar permisos
    let permHTML = '';
    if(isUserAdmin){
      permHTML = `<span class="perm-pill" style="background:rgba(244,185,66,.15);color:#F4B942;border-color:rgba(244,185,66,.3)">⭐ Acceso total al sistema</span>`;
    } else {
      const validPerms = perms.filter(p => ALL_PAGES[p]);
      permHTML = validPerms.length
        ? validPerms.map(p=>`<span class="perm-pill">${ALL_PAGES[p]}</span>`).join('')
        : `<span style="font-size:.72rem;color:var(--text-dim)">Sin páginas asignadas</span>`;
    }

    // Acciones:
    // - Uno mismo (admin): solo cambiar contraseña
    // - Otros usuarios: gestionar permisos + pass + eliminar
    let actionsHTML = '';
    if(isSelf){
      actionsHTML = `<button class="btn btn-ghost btn-sm" onclick="openChangePass('${u.id}','${(u.nombre||u.email||'').replace(/'/g,"\\'")}')" >🔑 Cambiar contraseña</button>`;
    } else {
      actionsHTML = `
        ${isAdmin?`<button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">✏️ Gestionar permisos</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="openChangePass('${u.id}','${(u.nombre||u.email||'').replace(/'/g,"\\'")}')">🔑 Pass</button>
        ${isAdmin?`<button class="btn btn-ghost btn-sm" style="color:var(--red);margin-left:auto" onclick="deleteUser('${u.id}')">🗑️ Eliminar</button>`:''}
      `;
    }

    return `<div class="user-card">
      <div class="user-header">
        <div class="user-avatar" style="background:${color}">${ini}</div>
        <div style="min-width:0">
          <div class="user-name">${esc(u.nombre||'Sin nombre')}</div>
          <div class="user-email">${esc(u.email||'—')}</div>
        </div>
      </div>
      <div class="user-row">
        <span class="badge ${badge}">${rolLbl}</span>
        <span class="badge ${u.activo!==false?'badge-green':'badge-red'}">${u.activo!==false?'● Activo':'○ Inactivo'}</span>
        ${isSelf?'<span class="badge" style="background:rgba(160,120,255,.12);color:#a078ff;border-color:rgba(160,120,255,.25)">Tú</span>':''}
      </div>
      <div class="user-perms">${permHTML}</div>
      ${u.creadoEn?`<div class="user-row" style="margin-top:4px;font-size:.72rem">📅 Alta: ${fmtDate(u.creadoEn)}</div>`:''}
      <div class="user-actions">${actionsHTML}</div>
    </div>`;
  }).join('');
}

// ── PERMS GRID (modal) ────────────────────────────────────────
function buildPermsGrid(selectedPerms, isAdminRol){
  // Owner y admin pueden gestionar permisos de otras cuentas
  const isCurrentAdmin = SESSION?.user?.rol === 'admin' || SESSION?.user?.rol === 'owner';
  const grid = document.getElementById('permsGrid');
  const warn = document.getElementById('adminWarning');
  const note = document.getElementById('adminPermsNote');

  if(isAdminRol){
    warn.style.display='block';
    note.style.display='none';
    grid.innerHTML = Object.entries(ALL_PAGES).map(([key,lbl])=>`
      <div class="perm-item checked disabled-perm">
        <input type="checkbox" checked disabled> ${lbl}
      </div>`).join('');
    return;
  }
  warn.style.display='none';
  note.style.display = isCurrentAdmin ? 'block' : 'none';

  grid.innerHTML = Object.entries(ALL_PAGES).map(([key,lbl])=>{
    const checked  = selectedPerms.includes(key);
    const disabled = !isCurrentAdmin;
    return `<label class="perm-item ${checked?'checked':''} ${disabled?'disabled-perm':''}"
        for="perm-${key}"
        id="perm-item-${key}"
        style="${disabled?'cursor:not-allowed':'cursor:pointer'}">
      <input type="checkbox"
        id="perm-${key}"
        ${checked?'checked':''}
        ${disabled?'disabled':''}
        onchange="onPermChange('${key}',this)">
      ${lbl}
    </label>`;
  }).join('');
}

function onPermChange(key, cb){
  const r=SESSION?.user?.rol; if(r!=='admin'&&r!=='owner'){ cb.checked = !cb.checked; return; }
  const item = document.getElementById('perm-item-'+key);
  if(item) item.classList.toggle('checked', cb.checked);
}

function togglePerm(key){
  if(SESSION?.user?.rol!=='admin') return;
  const cb  = document.getElementById('perm-'+key);
  if(!cb||cb.disabled) return;
  cb.checked = !cb.checked;
  cb.dispatchEvent(new Event('change'));
}

function getSelectedPerms(){
  return Object.keys(ALL_PAGES).filter(k=>{
    const cb = document.getElementById('perm-'+k);
    return cb && cb.checked;
  });
}

function onRolChange(){
  const rol     = document.getElementById('f-rol').value;
  const isAdmin = rol === 'admin' || rol === 'owner' || rol === 'director';
  const defaults = ROL_DEFAULT_PERMS[rol] || [];
  buildPermsGrid(defaults, isAdmin);
  // Mostrar descripción del rol
  const desc = {
    owner:     '👑 Acceso total a todas las sucursales del grupo',
    director:  '🏢 Acceso a sucursales asignadas, sin configuración de planes',
    admin:     '⚙️ Acceso total a esta sucursal',
    doctor:    '🦷 Agenda, expedientes, tratamientos y recetas',
    recepcion: '📅 Agenda, pacientes, cobros y recordatorios',
    asistente: '📋 Agenda y consulta de pacientes',
  }[rol] || '';
  const descEl = document.getElementById('rolDesc');
  if(descEl) descEl.textContent = desc;
}

// ── OPEN MODALS ───────────────────────────────────────────────
function openNewModal(){
  editId = null;
  document.getElementById('modalUserTitle').textContent = 'Nuevo Usuario';
  document.getElementById('f-nombre').value = '';
  document.getElementById('f-email').value  = '';
  document.getElementById('f-pass').value   = '';
  document.getElementById('f-rol').value    = 'recepcion';
  // Solo owner puede crear directores — mostrar/ocultar opciones avanzadas
  const isOwner = SESSION?.user?.rol === 'owner';
  const optDir  = document.getElementById('optDirector');
  const optOwn  = document.getElementById('optOwner');
  if(optDir) optDir.style.display = isOwner ? '' : 'none';
  if(optOwn) optOwn.style.display = 'none'; // owner nunca se puede crear desde aquí
  document.getElementById('f-activo').value = 'true';
  document.getElementById('passGroup').style.display = 'block';
  document.getElementById('f-email').disabled = false;
  buildPermsGrid(ROL_DEFAULT_PERMS.recepcion, false);
  openModal('modalUser');
}

function editUser(id){
  editId = id;
  const u = allUsers.find(u=>u.id===id);
  if(!u) return;
  document.getElementById('modalUserTitle').textContent = 'Editar Usuario';
  document.getElementById('f-nombre').value  = u.nombre||'';
  document.getElementById('f-email').value   = u.email||'';
  document.getElementById('f-email').disabled= true; // no se puede cambiar email
  document.getElementById('f-pass').value    = '';
  document.getElementById('f-rol').value     = u.rol||'recepcion';
  document.getElementById('f-activo').value  = u.activo!==false?'true':'false';
  document.getElementById('passGroup').style.display = 'none';
  const perms = u.permisos || ROL_DEFAULT_PERMS[u.rol] || [];
  buildPermsGrid(perms, u.rol==='admin');
  openModal('modalUser');
}

// ── SAVE USER ─────────────────────────────────────────────────
async function saveUser(){
  const nombre   = document.getElementById('f-nombre').value.trim().slice(0,120);
  const email    = document.getElementById('f-email').value.trim();
  const pass     = document.getElementById('f-pass').value;
  const rol      = document.getElementById('f-rol').value;
  const activo   = document.getElementById('f-activo').value==='true';
  const permisos = rol==='admin'
    ? [...Object.keys(ALL_PAGES), 'usuarios','configuracion','importar','planes']
    : getSelectedPerms();

  if(!nombre||!email){ showToast('Nombre y correo son obligatorios','error'); return; }
  const btn = document.getElementById('btnSaveUser');
  btn.disabled=true; btn.textContent='Guardando...';

  try{
    if(editId){
      // ── EDITAR usuario existente ─────────────────────────────
      await db.collection('usuarios').doc(editId).update({
        nombre, rol, activo, permisos,
        actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast('Usuario actualizado correctamente','success');
    audit('UPDATE_USUARIO',{id:editId,nombre:document.getElementById('f-nombre')?.value||'',rol:document.getElementById('f-rol')?.value||''});

    } else {
      // ── CREAR nuevo usuario ──────────────────────────────────
      if(!pass||pass.length<6){
        showToast('La contraseña debe tener al menos 6 caracteres','error');
        btn.disabled=false; btn.textContent='💾 Guardar usuario';
        return;
      }

      // Usar la config que ya existe en shared.js (app 'dental')
      // No usar firebase.app() porque busca '[DEFAULT]' que no existe
      const appName   = 'usr_tmp_'+Date.now();
      const mainApp   = firebase.app('dental'); // la app principal nombrada
      const secondApp = firebase.initializeApp(mainApp.options, appName);
      const secondAuth= secondApp.auth();
      const secondDb  = secondApp.firestore();

      try{
        // 1. Crear cuenta Auth con la app secundaria (no cierra sesión del admin)
        const cred  = await secondAuth.createUserWithEmailAndPassword(email, pass);
        const newUid = cred.user.uid;

        // 2. Escribir doc del usuario con secondDb
        //    (request.auth.uid == newUid → regla cumplida)
        await secondDb.collection('usuarios').doc(newUid).set({
          nombre, email, rol, activo, permisos,
          clinicaId: SESSION.clinica.id,
          creadoEn:  firebase.firestore.FieldValue.serverTimestamp(),
        });
        showToast('Usuario creado correctamente','success');
    audit('CREATE_USUARIO',{email:email,rol:rol});

      } finally {
        // 3. Siempre limpiar la app secundaria
        try{ await secondAuth.signOut(); }catch(_){}
        try{ await secondApp.delete();   }catch(_){}
      }
    }

    closeModal('modalUser');
    await loadUsers();

  }catch(e){
    console.error('saveUser error:', e);
    const msgs = {
      'auth/email-already-in-use': 'Ese correo ya está en uso',
      'auth/weak-password':        'Contraseña muy débil (mínimo 6 caracteres)',
      'auth/invalid-email':        'El correo electrónico no es válido',
      'permission-denied':         'Sin permisos — actualiza las reglas en Firebase Console',
    };
    showToast(msgs[e.code] || msgs[e.message] || 'Error: '+e.message, 'error');
  }

  btn.disabled=false; btn.textContent='💾 Guardar usuario';
}

// ── ELIMINAR USUARIO ──────────────────────────────────────────
async function deleteUser(id){
  const callerRol = SESSION?.user?.rol;
  if(callerRol!=='admin'&&callerRol!=='owner'){ showToast('Solo el administrador o propietario puede eliminar usuarios','error'); return; }
  const u = allUsers.find(x=>x.id===id);
  const ok = await confirmDialog(`¿Eliminar al usuario ${u?.nombre||''}?\nSe eliminará su acceso al sistema. Esta acción no se puede deshacer.`);
  if(!ok) return;
  try{
    await db.collection('usuarios').doc(id).delete();
    showToast('Usuario eliminado','success');
    audit('DELETE_USUARIO',{id:id,nombre:u?.nombre||''});
    await loadUsers();
  } catch(e) { handleError(e, 'usuarios'); }
}

// ── CAMBIO DE CONTRASEÑA ──────────────────────────────────────
function openChangePass(uid,nombre){
  changePassUid=uid;
  document.getElementById('pass-usuario').value=nombre;
  document.getElementById('pass-nueva').value='';
  document.getElementById('pass-confirm').value='';
  openModal('modalPass');
}
async function savePass(){
  const nueva   = document.getElementById('pass-nueva').value;
  const confirm = document.getElementById('pass-confirm').value;
  if(!nueva||nueva.length<6){ showToast('Mínimo 6 caracteres','error'); return; }
  if(nueva!==confirm){ showToast('Las contraseñas no coinciden','error'); return; }
  if(changePassUid===SESSION?.user?.uid){
    try{
      await auth.currentUser.updatePassword(nueva);
      showToast('Contraseña actualizada','success');
      closeModal('modalPass');
    } catch(e) { handleError(e, 'usuarios'); }
  } else {
    await db.collection('usuarios').doc(changePassUid).update({
      passwordReset:true, newPasswordTemp:nueva,
      actualizadoEn:firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('Contraseña temporal guardada. El usuario debe cerrar sesión y volver a entrar.','success');
    closeModal('modalPass');
  }
}

// ── HELPER ────────────────────────────────────────────────────
function fmtDate(ts){
  if(!ts) return '—';
  try{
    const d = ts.toDate?ts.toDate():new Date(ts);
    return d.toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'});
  }catch(e){return '—';}
}
