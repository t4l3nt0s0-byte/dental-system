<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hersantych Dental · Catálogo & Precios</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;transition:all .2s;position:relative;overflow:hidden}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--blue));opacity:0;transition:opacity .2s}
.cat-card:hover{border-color:rgba(0,194,168,.3);transform:translateY(-2px)}.cat-card:hover::before{opacity:1}
.cat-card.inactivo{opacity:.5}
.cat-name{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:4px}
.cat-desc{font-size:.77rem;color:var(--text-muted);line-height:1.5;margin-bottom:14px;min-height:32px}
.price-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.price-label{font-size:.68rem;color:var(--text-dim);letter-spacing:.04em}
.price-val{font-family:var(--font-mono);font-size:.82rem;color:var(--text-muted)}
.price-sug{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;color:var(--teal)}
.cat-actions{display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filters .search-wrap{flex:1;min-width:180px}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<button class="hamburger" id="hamburger">☰</button>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">📚 Catálogo & Precios</div>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="btnNuevo">+ Agregar tratamiento</button>
      <a href="cotizacion.html" class="btn btn-ghost">📝 Generar cotización</a>
    </div>
  </div>
  <div class="content">
    <div class="filters">
      <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="searchInput" placeholder="Buscar tratamiento..."></div>
      <select class="form-select" id="filterVigente" style="width:150px">
        <option value="">Todos</option><option value="true">Vigentes</option><option value="false">Inactivos</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="btnExport">📥 CSV</button>
    </div>
    <div class="cat-grid" id="catGrid"><div class="loader"><div class="spinner"></div>Cargando...</div></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalCat">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalCatTitle">Nuevo Tratamiento</div>
      <button class="modal-close" onclick="closeModal('modalCat')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full"><label class="form-label">Nombre del tratamiento *</label><input class="form-input" id="f-treat" placeholder="Ej: Endodoncia Bicúspide"></div>
        <div class="form-group full"><label class="form-label">Descripción</label><textarea class="form-textarea" id="f-desc" placeholder="Detalle del procedimiento..." rows="2"></textarea></div>
        <div class="form-group"><label class="form-label">Precio mínimo (MXN)</label><input type="number" class="form-input" id="f-min" min="0" step="0.01" placeholder="0"></div>
        <div class="form-group"><label class="form-label">Precio máximo (MXN)</label><input type="number" class="form-input" id="f-max" min="0" step="0.01" placeholder="0"></div>
        <div class="form-group"><label class="form-label">Precio sugerido (MXN) *</label><input type="number" class="form-input" id="f-sug" min="0" step="0.01" placeholder="0"></div>
        <div class="form-group"><label class="form-label">¿Aplica IVA por defecto?</label>
          <select class="form-select" id="f-iva"><option value="no">Sin IVA</option><option value="si">Con IVA (16%)</option></select>
        </div>
        <div class="form-group"><label class="form-label">Estado</label>
          <select class="form-select" id="f-vigente"><option value="true">Vigente</option><option value="false">Inactivo</option></select>
        </div>
        <div class="form-group"><label class="form-label">Duración estimada</label>
          <select class="form-select" id="f-duracion"><option value="">Sin especificar</option><option>30 min</option><option>45 min</option><option>1 hora</option><option>1.5 hrs</option><option>2 horas</option><option>Múltiples sesiones</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalCat')">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveCat">💾 Guardar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
window.CURRENT_PAGE = 'catalogo';
let allCat = [], editId = null;

initSession('any').then(async () => {
  await loadCatalogo();
  document.getElementById('searchInput').addEventListener('input', renderGrid);
  document.getElementById('filterVigente').addEventListener('change', renderGrid);
  document.getElementById('btnNuevo').addEventListener('click', openNewModal);
  document.getElementById('btnSaveCat').addEventListener('click', saveCat);
  document.getElementById('btnExport').addEventListener('click', exportCSV);
});

async function loadCatalogo() {
  allCat = await fsGetAll('catalogo', r => r.orderBy('tratamiento','asc'));
  renderGrid();
}

function renderGrid() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const v = document.getElementById('filterVigente').value;
  const filtered = allCat.filter(c =>
    (!q || c.tratamiento?.toLowerCase().includes(q) || c.desc?.toLowerCase().includes(q)) &&
    (v === '' || String(c.vigente) === v)
  );
  const grid = document.getElementById('catGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📚</div><div class="empty-title">Sin resultados</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(c => `
    <div class="cat-card ${!c.vigente?'inactivo':''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px">
        <div class="cat-name">${c.tratamiento}</div>
        ${!c.vigente?'<span class="badge badge-purple">Inactivo</span>':''}
      </div>
      <div class="cat-desc">${c.desc||'Sin descripción'}</div>
      <div class="price-row"><span class="price-label">Precio mínimo</span><span class="price-val">${fmtMXN(c.min||0)}</span></div>
      <div class="price-row"><span class="price-label">Precio máximo</span><span class="price-val">${fmtMXN(c.max||0)}</span></div>
      <div class="price-row"><span class="price-label">Precio sugerido</span><span class="price-sug">${fmtMXN(c.sugerido||0)}</span></div>
      ${c.iva==='si'?`<div class="price-row"><span class="price-label">Con IVA (16%)</span><span class="price-val" style="color:var(--gold)">${fmtMXN((c.sugerido||0)*1.16)}</span></div>`:''}
      ${c.duracion?`<div style="font-size:.7rem;color:var(--text-dim);margin-top:4px">⏱ ${c.duracion}</div>`:''}
      <div class="cat-actions">
        <button class="btn btn-ghost btn-sm" onclick="editCat('${c.id}')">✏️ Editar</button>
        <a href="cotizacion.html?t=${encodeURIComponent(c.tratamiento)}" class="btn btn-ghost btn-sm">📝 Cotizar</a>
        <button class="btn btn-ghost btn-sm" style="color:var(--red);margin-left:auto" onclick="deleteCat('${c.id}')">🗑️</button>
      </div>
    </div>`).join('');
}

function openNewModal() {
  editId = null;
  document.getElementById('modalCatTitle').textContent = 'Nuevo Tratamiento';
  ['f-treat','f-desc','f-min','f-max','f-sug'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-iva').value = 'no';
  document.getElementById('f-vigente').value = 'true';
  document.getElementById('f-duracion').value = '';
  openModal('modalCat');
}

function editCat(id) {
  editId = id;
  const c = allCat.find(x=>x.id===id); if(!c) return;
  document.getElementById('modalCatTitle').textContent = 'Editar Tratamiento';
  document.getElementById('f-treat').value = c.tratamiento||'';
  document.getElementById('f-desc').value = c.desc||'';
  document.getElementById('f-min').value = c.min||0;
  document.getElementById('f-max').value = c.max||0;
  document.getElementById('f-sug').value = c.sugerido||0;
  document.getElementById('f-iva').value = c.iva||'no';
  document.getElementById('f-vigente').value = String(c.vigente!==false);
  document.getElementById('f-duracion').value = c.duracion||'';
  openModal('modalCat');
}

async function saveCat() {
  const treat = document.getElementById('f-treat').value.trim();
  if (!treat) { showToast('El nombre es obligatorio','error'); return; }
  const data = {
    tratamiento: treat,
    desc: document.getElementById('f-desc').value.trim(),
    min: parseFloat(document.getElementById('f-min').value)||0,
    max: parseFloat(document.getElementById('f-max').value)||0,
    sugerido: parseFloat(document.getElementById('f-sug').value)||0,
    iva: document.getElementById('f-iva').value,
    vigente: document.getElementById('f-vigente').value === 'true',
    duracion: document.getElementById('f-duracion').value,
  };
  const btn = document.getElementById('btnSaveCat');
  btn.disabled=true; btn.textContent='Guardando...';
  try {
    if (editId) await fsUpdate('catalogo',editId,data);
    else await fsCreate('catalogo',data);
    showToast(editId?'Tratamiento actualizado':'Tratamiento agregado','success');
    closeModal('modalCat');
    await loadCatalogo();
  } catch(e){ showToast('Error: '+e.message,'error'); }
  btn.disabled=false; btn.textContent='💾 Guardar';
}

async function deleteCat(id) {
  if(!await confirmDialog('¿Eliminar este tratamiento del catálogo?')) return;
  try {
    await fsDelete('catalogo',id);
    showToast('Eliminado del catálogo','success');
    await loadCatalogo();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}

function exportCSV() {
  const headers=['Tratamiento','Descripción','Precio Mín','Precio Máx','Precio Sugerido','IVA','Vigente'];
  const rows=allCat.map(c=>[c.tratamiento,c.desc,c.min,c.max,c.sugerido,c.iva==='si'?'Sí':'No',c.vigente?'Sí':'No'].map(v=>`"${v||''}"`).join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`catalogo_${todayISO()}.csv`; a.click();
  showToast('Catálogo exportado','success');
}
</script>
</body>
</html>
