<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
html,body{background:#060D14;color:#E8EAF0;margin:0;padding:0}
@media(min-width:768px){.main{margin-left:240px}}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00C2A8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hersantych">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://*.firebaseio.com https://*.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://*.googleapis.com https://*.gstatic.com https://*.firebaseapp.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com;"><link rel="icon" href="favicon.ico?v=2" sizes="any"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="shortcut icon" href="favicon.ico"><link rel="apple-touch-icon" href="icons/icon-192.png"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hersantych · Búsqueda Global</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.search-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;margin-bottom:20px;text-align:center}
.search-hero-title{font-family:var(--font-display);font-size:1.4rem;font-style:italic;margin-bottom:6px}
.search-hero-sub{font-size:.78rem;color:var(--text-muted);margin-bottom:18px}
.search-big{position:relative}
.search-big .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;color:var(--text-dim);pointer-events:none}
.search-big input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px 14px 44px;color:var(--text);font-family:var(--font-body);font-size:1rem;outline:none;transition:border-color .2s}
.search-big input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim)}
.search-big input::placeholder{color:var(--text-dim)}
.search-kbd{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:.65rem;color:var(--text-dim);font-family:var(--font-mono)}
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;justify-content:center}
.filter-tab{padding:5px 14px;border-radius:100px;font-size:.74rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:all .15s}
.filter-tab:hover{color:var(--text);border-color:var(--border2)}
.filter-tab.active{background:var(--teal-dim);color:var(--teal);border-color:rgba(0,194,168,.3)}
/* RESULTS */
.results-count{font-size:.75rem;color:var(--text-muted);margin-bottom:14px}
.result-section{margin-bottom:22px}
.result-section-title{font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.result-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.result-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;text-decoration:none}
.result-item:hover{border-color:rgba(0,194,168,.3);background:var(--surface2)}
.result-icon{font-size:1.1rem;width:32px;text-align:center;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-title{font-size:.85rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-sub{font-size:.72rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-meta{font-family:var(--font-mono);font-size:.75rem;color:var(--text-muted);flex-shrink:0}
mark{background:var(--teal-dim);color:var(--teal);border-radius:2px;padding:0 2px}
.recent-searches{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center}
.recent-chip{background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:4px 12px;font-size:.73rem;color:var(--text-muted);cursor:pointer;transition:all .15s}
.recent-chip:hover{background:var(--teal-dim);color:var(--teal);border-color:rgba(0,194,168,.3)}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<button class="hamburger" id="hamburger">☰</button>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">🔍 Búsqueda Global</div>
  </div>
  <div class="content">
    <div class="search-hero">
      <div class="search-hero-title">¿Qué estás buscando?</div>
      <div class="search-hero-sub">Busca pacientes, tratamientos, abonos, citas y más en tiempo real.</div>
      <div class="search-big">
        <span class="search-icon">🔍</span>
        <input id="mainSearch" placeholder="Nombre de paciente, tratamiento, monto, fecha..." autofocus>
        <span class="search-kbd">/</span>
      </div>
      <div class="filter-tabs">
        <div class="filter-tab active" data-filter="all" onclick="setFilter('all')">Todos</div>
        <div class="filter-tab" data-filter="pacientes" onclick="setFilter('pacientes')">👤 Pacientes</div>
        <div class="filter-tab" data-filter="tratamientos" onclick="setFilter('tratamientos')">🦷 Tratamientos</div>
        <div class="filter-tab" data-filter="abonos" onclick="setFilter('abonos')">💰 Pagos</div>
        <div class="filter-tab" data-filter="citas" onclick="setFilter('citas')">📅 Citas</div>
        <div class="filter-tab" data-filter="catalogo" onclick="setFilter('catalogo')">📚 Catálogo</div>
      </div>
      <div class="recent-searches" id="recentSearches"></div>
    </div>

    <div id="resultsArea">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Escribe para buscar</div>
        <div class="empty-sub">Resultados aparecerán aquí conforme escribas</div>
      </div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script src="dataService.js"></script>
<script>
window.CURRENT_PAGE = 'busqueda';
let allData = { pacientes:[], tratamientos:[], abonos:[], citas:[], catalogo:[] };
let activeFilter = 'all';
let searchTimer = null;
let recentSearches = JSON.parse(localStorage.getItem('dental_recent_searches')||'[]');

// Shortcut key /
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('mainSearch')) {
    e.preventDefault();
    document.getElementById('mainSearch').focus();
  }
});

initSession('any').then(async session => {
  if (!session) return;
  renderRecentSearches();
  await loadAll();
  document.getElementById('mainSearch').addEventListener('input', onSearch);
  document.getElementById('mainSearch').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = e.target.value.trim();
      if (q) addRecentSearch(q);
    }
  });
  // Check URL param
  const q = new URLSearchParams(location.search).get('q');
  if (q) { document.getElementById('mainSearch').value = q; doSearch(q); }
});

async function loadAll() {
  const [px, trat, abonos, citas, cat] = await Promise.all([
    fsGetAll('pacientes', r => r.orderBy('nombre','asc')),
    fsGetAll('tratamientos',r=>r.limit(200)),
    fsGetAll('abonos', r => r.orderBy('creadoEn','desc').limit(500)),
    fsGetAll('citas', r => r.orderBy('creadoEn','desc').limit(200)),
    fsGetAll('catalogo', r => r.orderBy('tratamiento','asc')),
  ]);
  allData = { pacientes:px, tratamientos:trat, abonos, citas, catalogo:cat };
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter===f));
  const q = document.getElementById('mainSearch').value.trim();
  if (q) doSearch(q);
}

function onSearch() {
  clearTimeout(searchTimer);
  const q = document.getElementById('mainSearch').value.trim();
  if (!q) {
    document.getElementById('resultsArea').innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Escribe para buscar</div></div>`;
    return;
  }
  // Mínimo 3 caracteres — evita queries costosas por 1-2 letras
  if (q.length < 3) {
    document.getElementById('resultsArea').innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Escribe al menos 3 caracteres</div></div>`;
    return;
  }
  // Debounce 500ms — no busca en cada tecla
  searchTimer = setTimeout(() => doSearch(q), 500);
}

function highlight(text, q) {
  if (!q || !text) return text||'';
  const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return String(text).replace(regex, '<mark>$1</mark>');
}

function doSearch(q) {
  const ql = q.toLowerCase();
  const results = {};

  if (activeFilter === 'all' || activeFilter === 'pacientes') {
    results.pacientes = allData.pacientes.filter(p =>
      p.nombre?.toLowerCase().includes(ql) ||
      p.tel?.includes(ql) ||
      p.email?.toLowerCase().includes(ql) ||
      p.expediente?.toLowerCase().includes(ql) ||
      p.alergias?.toLowerCase().includes(ql)
    );
  }
  if (activeFilter === 'all' || activeFilter === 'tratamientos') {
    results.tratamientos = allData.tratamientos.filter(t =>
      t.paciente?.toLowerCase().includes(ql) ||
      t.tratamiento?.toLowerCase().includes(ql) ||
      t.descripcion?.toLowerCase().includes(ql) ||
      String(t.costo||'').includes(ql)
    );
  }
  if (activeFilter === 'all' || activeFilter === 'abonos') {
    results.abonos = allData.abonos.filter(a =>
      a.paciente?.toLowerCase().includes(ql) ||
      a.tratamiento?.toLowerCase().includes(ql) ||
      a.forma?.toLowerCase().includes(ql) ||
      a.fecha?.includes(ql) ||
      String(a.monto||'').includes(ql)
    );
  }
  if (activeFilter === 'all' || activeFilter === 'citas') {
    results.citas = allData.citas.filter(c =>
      c.paciente?.toLowerCase().includes(ql) ||
      c.tratamiento?.toLowerCase().includes(ql) ||
      c.fecha?.includes(ql) ||
      c.estado?.toLowerCase().includes(ql)
    );
  }
  if (activeFilter === 'all' || activeFilter === 'catalogo') {
    results.catalogo = allData.catalogo.filter(c =>
      c.tratamiento?.toLowerCase().includes(ql) ||
      c.desc?.toLowerCase().includes(ql)
    );
  }

  renderResults(results, q);
}

function renderResults(results, q) {
  const totalCount = Object.values(results).reduce((s,arr)=>s+(arr?.length||0),0);
  const area = document.getElementById('resultsArea');
  if (!totalCount) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-title">Sin resultados</div><div class="empty-sub">No se encontró nada para "<strong>${q}</strong>"</div></div>`;
    return;
  }

  let html = `<div class="results-count">${totalCount} resultado(s) para "<strong>${q}</strong>"</div>`;

  if (results.pacientes?.length) {
    html += `<div class="result-section"><div class="result-section-title">👤 Pacientes (${results.pacientes.length})</div>`;
    html += results.pacientes.slice(0,5).map(p=>`
      <a href="pacientes.html" class="result-item">
        <div class="result-icon">👤</div>
        <div class="result-info">
          <div class="result-title">${highlight(p.nombre,q)}</div>
          <div class="result-sub">${highlight(p.expediente||p.id,q)} · ${highlight(p.tel||'',q)} · ${p.genero||''} ${p.edad?'· '+p.edad+' años':''}</div>
        </div>
        ${p.alergias&&p.alergias!=='Ninguna'?`<span class="badge badge-gold" style="font-size:.65rem">⚠️ ${p.alergias}</span>`:''}
      </a>`).join('');
    if (results.pacientes.length>5) html+=`<div style="font-size:.75rem;color:var(--text-dim);text-align:center;padding:6px">+${results.pacientes.length-5} más</div>`;
    html += '</div>';
  }

  if (results.tratamientos?.length) {
    html += `<div class="result-section"><div class="result-section-title">🦷 Tratamientos (${results.tratamientos.length})</div>`;
    const estadoClass = {Liquidado:'badge-green',Abonando:'badge-gold',Pendiente:'badge-red'};
    html += results.tratamientos.slice(0,5).map(t=>`
      <a href="tratamientos.html" class="result-item">
        <div class="result-icon">🦷</div>
        <div class="result-info">
          <div class="result-title">${highlight(t.paciente,q)} — ${highlight(t.tratamiento,q)}</div>
          <div class="result-sub">${t.fechaInicio||'—'} · ${highlight(t.descripcion||'',q)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="badge ${estadoClass[t.estado]||'badge-blue'}" style="font-size:.65rem">${t.estado||'—'}</span>
          <span class="result-meta">${fmtMXN(t.costo)}</span>
        </div>
      </a>`).join('');
    html += '</div>';
  }

  if (results.abonos?.length) {
    html += `<div class="result-section"><div class="result-section-title">💰 Pagos (${results.abonos.length})</div>`;
    html += results.abonos.slice(0,5).map(a=>`
      <a href="abonos.html" class="result-item">
        <div class="result-icon">💰</div>
        <div class="result-info">
          <div class="result-title">${highlight(a.paciente,q)}</div>
          <div class="result-sub">${highlight(a.tratamiento||'',q)} · ${highlight(a.forma||'',q)} · ${highlight(a.fecha||'',q)}</div>
        </div>
        <div class="result-meta" style="color:var(--teal)">${fmtMXN(a.monto)}</div>
      </a>`).join('');
    html += '</div>';
  }

  if (results.citas?.length) {
    html += `<div class="result-section"><div class="result-section-title">📅 Citas (${results.citas.length})</div>`;
    html += results.citas.slice(0,5).map(c=>`
      <a href="agenda.html" class="result-item">
        <div class="result-icon">📅</div>
        <div class="result-info">
          <div class="result-title">${highlight(c.paciente,q)}</div>
          <div class="result-sub">${highlight(c.fecha||'',q)} ${c.hora?'a las '+c.hora:''} · ${highlight(c.tratamiento||'Sin tratamiento',q)}</div>
        </div>
        <span class="badge badge-gold" style="font-size:.65rem">${c.estado||'Agendado'}</span>
      </a>`).join('');
    html += '</div>';
  }

  if (results.catalogo?.length) {
    html += `<div class="result-section"><div class="result-section-title">📚 Catálogo (${results.catalogo.length})</div>`;
    html += results.catalogo.slice(0,5).map(c=>`
      <a href="catalogo.html" class="result-item">
        <div class="result-icon">📚</div>
        <div class="result-info">
          <div class="result-title">${highlight(c.tratamiento,q)}</div>
          <div class="result-sub">${highlight(c.desc||'',q)}</div>
        </div>
        <div class="result-meta" style="color:var(--teal)">${fmtMXN(c.sugerido||0)}</div>
      </a>`).join('');
    html += '</div>';
  }

  area.innerHTML = html;
}

function addRecentSearch(q) {
  recentSearches = [q, ...recentSearches.filter(s=>s!==q)].slice(0,8);
  localStorage.setItem('dental_recent_searches', JSON.stringify(recentSearches));
  renderRecentSearches();
}

function renderRecentSearches() {
  const el = document.getElementById('recentSearches');
  if (!recentSearches.length) { el.innerHTML=''; return; }
  el.innerHTML = recentSearches.map(s=>
    `<div class="recent-chip" onclick="document.getElementById('mainSearch').value='${s}';onSearch()">${s}</div>`
  ).join('');
}

window.onSearch = onSearch;
</script>
<script>
// ── Service Worker Registration ────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js', { scope: '/dental-system/' })
      .then(function(reg) {
        console.log('[PWA] SW registered, scope:', reg.scope);
        // Check for updates every 10 minutes
        setInterval(function() { reg.update(); }, 600000);
      })
      .catch(function(err) {
        console.warn('[PWA] SW registration failed:', err.message);
      });
  });
}
</script>
</body>
</html>
