<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hersantych Dental · Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.agenda-layout{display:grid;grid-template-columns:320px 1fr;gap:20px}
/* CALENDAR */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;position:sticky;top:80px;height:fit-content}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-family:var(--font-display);font-size:1.05rem;font-style:italic}
.cal-nav{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .15s}
.cal-nav:hover{background:var(--surface2);color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:.62rem;font-weight:700;color:var(--text-dim);text-align:center;padding:6px 0;letter-spacing:.08em;text-transform:uppercase}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:.78rem;font-weight:500;color:var(--text-muted);transition:all .15s;position:relative;gap:2px}
.cal-day:hover{background:var(--surface2);color:var(--text)}
.cal-day.today{background:var(--teal-dim);color:var(--teal);font-weight:700}
.cal-day.selected{background:var(--teal);color:#060D14;font-weight:700}
.cal-day.has-citas::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);position:absolute;bottom:3px}
.cal-day.selected.has-citas::after{background:#060D14}
.cal-day.other-month{opacity:.3}
/* DAY VIEW */
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.day-title{font-family:var(--font-display);font-size:1.2rem;font-style:italic}
.cita-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;transition:all .2s;position:relative;overflow:hidden}
.cita-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.cita-card.estado-Agendado::before{background:var(--gold)}
.cita-card.estado-Confirmado::before{background:var(--teal)}
.cita-card.estado-Completado::before{background:var(--green)}
.cita-card.estado-Cancelado::before{background:var(--red)}
.cita-card.estado-NoAsistio::before{background:var(--purple)}
.cita-card:hover{border-color:var(--border2)}
.cita-time-block{text-align:center;min-width:52px;padding-top:2px}
.cita-time-big{font-family:var(--font-mono);font-size:1rem;font-weight:700;color:var(--teal);line-height:1}
.cita-time-dur{font-size:.65rem;color:var(--text-dim);margin-top:3px}
.cita-body{flex:1;min-width:0}
.cita-paciente{font-size:.92rem;font-weight:700;color:var(--text);margin-bottom:3px}
.cita-tratamiento{font-size:.78rem;color:var(--text-muted);margin-bottom:6px}
.cita-chips{display:flex;gap:6px;flex-wrap:wrap}
.cita-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
@media(max-width:900px){.agenda-layout{grid-template-columns:1fr}.cal-wrap{position:static}}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<button class="hamburger" id="hamburger">☰</button>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">📅 Agenda de Citas</div>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="btnNuevo">+ Nueva cita</button>
    </div>
  </div>
  <div class="content">
    <div class="agenda-layout">
      <!-- CALENDAR -->
      <div>
        <div class="cal-wrap">
          <div class="cal-header">
            <button class="cal-nav" id="prevMonth">‹</button>
            <div class="cal-month" id="calMonth"></div>
            <button class="cal-nav" id="nextMonth">›</button>
          </div>
          <div class="cal-grid">
            <div class="cal-dow">Lu</div><div class="cal-dow">Ma</div><div class="cal-dow">Mi</div>
            <div class="cal-dow">Ju</div><div class="cal-dow">Vi</div><div class="cal-dow">Sa</div><div class="cal-dow">Do</div>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
        <!-- Mini stats -->
        <div class="card" style="margin-top:14px">
          <div style="font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px">Este mes</div>
          <div id="monthStats" style="display:flex;flex-direction:column;gap:8px;font-size:.8rem;color:var(--text-muted)"></div>
        </div>
      </div>
      <!-- DAY VIEW -->
      <div>
        <div class="day-header">
          <div class="day-title" id="dayTitle">Selecciona un día</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" id="btnHoy">Hoy</button>
          </div>
        </div>
        <div id="dayView"><div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">Selecciona un día en el calendario</div><div class="empty-sub">Las citas del día aparecerán aquí</div></div></div>
      </div>
    </div>
  </div>
</main>

<!-- MODAL NUEVA CITA -->
<div class="modal-overlay" id="modalCita">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalCitaTitle">Nueva Cita</div>
      <button class="modal-close" onclick="closeModal('modalCita')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Paciente *</label>
          <select class="form-select" id="f-paciente">
            <option value="">Seleccionar paciente...</option>
            <option value="_nuevo">+ Paciente nuevo (sin expediente)</option>
          </select>
        </div>
        <div class="form-group full" id="nombreLibreWrap" style="display:none">
          <label class="form-label">Nombre del paciente</label>
          <input class="form-input" id="f-nombre-libre" placeholder="Nombre completo">
        </div>
        <div class="form-group"><label class="form-label">Fecha *</label><input type="date" class="form-input" id="f-fecha"></div>
        <div class="form-group"><label class="form-label">Hora *</label><input type="time" class="form-input" id="f-hora"></div>
        <div class="form-group"><label class="form-label">Duración (min)</label>
          <select class="form-select" id="f-duracion"><option value="30">30 min</option><option value="45">45 min</option><option value="60" selected>1 hora</option><option value="90">1.5 hrs</option><option value="120">2 horas</option></select>
        </div>
        <div class="form-group"><label class="form-label">Teléfono</label><input class="form-input" id="f-tel" placeholder="55 0000 0000" type="tel"></div>
        <div class="form-group full">
          <label class="form-label">Tratamiento / Motivo</label>
          <select class="form-select" id="f-tratamiento"><option value="">Sin especificar</option></select>
        </div>
        <div class="form-group full"><label class="form-label">Descripción / Notas</label><textarea class="form-textarea" id="f-desc" placeholder="Detalles adicionales de la cita..." rows="2"></textarea></div>
        <div class="form-group"><label class="form-label">Estado</label>
          <select class="form-select" id="f-estado"><option>Agendado</option><option>Confirmado</option><option>Completado</option><option>Cancelado</option><option>No Asistió</option></select>
        </div>
        <div class="form-group"><label class="form-label">¿Requiere RX?</label>
          <select class="form-select" id="f-rx"><option>No</option><option>Sí</option></select>
        </div>
      </div>
      <div style="margin-top:14px;padding:12px;background:var(--teal-dim);border:1px solid rgba(0,194,168,.2);border-radius:8px;font-size:.78rem;color:var(--teal)" id="whatsappPreview"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalCita')">Cancelar</button>
      <button class="btn btn-ghost" id="btnWaSend" style="display:none">💬 Enviar WhatsApp</button>
      <button class="btn btn-primary" id="btnSaveCita">💾 Guardar cita</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="shared.js"></script>
<script>
window.CURRENT_PAGE = 'agenda';
let allCitas = [], allPacientes = [], allCatalogo = [];
let currentDate = new Date();
let selectedDate = todayISO();
let editId = null;

initSession('any').then(async session => {
  if (!session) return;
  await Promise.all([loadCitas(), loadPacientes(), loadCatalogo()]);
  renderCalendar();
  renderDay(selectedDate);
  renderMonthStats();

  document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); });
  document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); });
  document.getElementById('btnHoy').addEventListener('click', () => { currentDate = new Date(); selectedDate = todayISO(); renderCalendar(); renderDay(selectedDate); });
  document.getElementById('btnNuevo').addEventListener('click', () => openNewModal(selectedDate));
  document.getElementById('btnSaveCita').addEventListener('click', saveCita);

  document.getElementById('f-paciente').addEventListener('change', function() {
    const isNuevo = this.value === '_nuevo';
    document.getElementById('nombreLibreWrap').style.display = isNuevo ? 'block' : 'none';
    if (!isNuevo && this.value) {
      const px = allPacientes.find(p=>p.id===this.value);
      if (px) document.getElementById('f-tel').value = px.tel||'';
    }
    updateWAPreview();
  });
  ['f-fecha','f-hora','f-tratamiento'].forEach(id => document.getElementById(id)?.addEventListener('change', updateWAPreview));

  // ── Detectar llegada desde "Reagendar" del dashboard ──
  const params = new URLSearchParams(window.location.search);
  if(params.get('reagendar')==='1'){
    const nomPaciente = decodeURIComponent(params.get('paciente')||'');
    // Abrir modal de nueva cita
    openNewModal(selectedDate);
    // Si hay nombre de paciente, intentar preseleccionarlo
    if(nomPaciente){
      setTimeout(()=>{
        const sel = document.getElementById('f-paciente');
        if(sel){
          // Buscar opción que contenga el nombre
          const opt = Array.from(sel.options).find(o=>o.text.toLowerCase().includes(nomPaciente.toLowerCase().split(' ')[0]));
          if(opt){ sel.value=opt.value; sel.dispatchEvent(new Event('change')); }
        }
        // Mostrar toast informativo
        if(typeof showToast==='function') showToast('📅 Agendando nueva cita para '+nomPaciente,'success');
      }, 300);
    }
  }
});

async function loadCitas() {
  allCitas = await fsGetAll('citas');
}
async function loadPacientes() {
  allPacientes = await fsGetAll('pacientes', r => r.orderBy('nombre','asc'));
  const sel = document.getElementById('f-paciente');
  sel.innerHTML = '<option value="">Seleccionar paciente...</option><option value="_nuevo">+ Paciente sin expediente</option>' +
    allPacientes.map(p=>`<option value="${p.id}">${p.nombre||p.id}</option>`).join('');
}
async function loadCatalogo() {
  allCatalogo = await fsGetAll('catalogo', r => r.orderBy('tratamiento','asc'));
  const sel = document.getElementById('f-tratamiento');
  sel.innerHTML = '<option value="">Sin especificar</option>' +
    allCatalogo.map(c=>`<option value="${c.tratamiento}">${c.tratamiento}</option>`).join('');
}

function renderCalendar() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('calMonth').textContent = `${monthNames[m]} ${y}`;
  const firstDay = new Date(y,m,1);
  const lastDay  = new Date(y,m+1,0);
  // Monday-based: 0=Mon...6=Sun
  let startDow = firstDay.getDay(); startDow = startDow===0?6:startDow-1;
  const today = todayISO();
  const citasDates = new Set(allCitas.map(c=>c.fecha));
  let html = '';
  // Prev month padding
  for(let i=0;i<startDow;i++){
    const d = new Date(y,m,1-startDow+i);
    html += `<div class="cal-day other-month">${d.getDate()}</div>`;
  }
  for(let d=1;d<=lastDay.getDate();d++){
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = iso===today, isSel = iso===selectedDate;
    const hasCitas = citasDates.has(iso);
    html += `<div class="cal-day ${isToday&&!isSel?'today':''} ${isSel?'selected':''} ${hasCitas?'has-citas':''}" onclick="selectDay('${iso}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

function selectDay(iso) {
  selectedDate = iso;
  renderCalendar();
  renderDay(iso);
}

function renderDay(iso) {
  const d = new Date(iso+'T12:00:00');
  const dayNames=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const monthNames=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('dayTitle').textContent = `${dayNames[d.getDay()]}, ${d.getDate()} de ${monthNames[d.getMonth()]} ${d.getFullYear()}`;
  const dayCitas = allCitas.filter(c=>c.fecha===iso).sort((a,b)=>(a.hora||'').localeCompare(b.hora||''));
  const container = document.getElementById('dayView');
  if(!dayCitas.length){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">Sin citas este día</div><div class="empty-sub"><button class="btn btn-primary btn-sm" onclick="openNewModal('${iso}')">+ Agendar cita</button></div></div>`;
    return;
  }
  const estadoClass={Agendado:'badge-gold',Confirmado:'badge-teal',Completado:'badge-green',Cancelado:'badge-red','No Asistió':'badge-purple'};
  container.innerHTML = dayCitas.map(c=>`
    <div class="cita-card estado-${(c.estado||'Agendado').replace(/\s/g,'')}">
      <div class="cita-time-block">
        <div class="cita-time-big">${c.hora||'—'}</div>
        <div class="cita-time-dur">${c.duracion||60}min</div>
      </div>
      <div class="cita-body">
        <div class="cita-paciente">${c.paciente||'—'}</div>
        <div class="cita-tratamiento">${c.tratamiento||'Sin tratamiento especificado'}${c.descripcion?' · '+c.descripcion:''}</div>
        <div class="cita-chips">
          <span class="badge ${estadoClass[c.estado]||'badge-blue'}">${c.estado||'Agendado'}</span>
          ${c.rx==='Sí'?'<span class="badge badge-purple">📷 RX</span>':''}
          ${c.tel?`<span class="badge badge-blue" style="cursor:pointer" onclick="whatsapp('${c.tel}','Hola ${(c.paciente||'').split(' ')[0]}, te recordamos tu cita el ${iso} a las ${c.hora} en Hersantych Dental. ¿Confirmas tu asistencia?')">💬 ${c.tel}</span>`:''}
        </div>
      </div>
      <div class="cita-actions">
        <button class="btn btn-ghost btn-sm btn-icon" onclick="editCita('${c.id}')" title="Editar">✏️</button>
        ${c.tel?`<button class="btn btn-ghost btn-sm btn-icon" onclick="whatsapp('${c.tel}','Hola ${(c.paciente||'').split(' ')[0]}, te confirmamos tu cita mañana a las ${c.hora} en Hersantych Dental. ¡Te esperamos!')" title="WhatsApp">💬</button>`:''}
        <button class="btn btn-ghost btn-sm btn-icon" style="color:var(--red)" onclick="deleteCita('${c.id}')" title="Eliminar">🗑️</button>
      </div>
    </div>`).join('');
}

function renderMonthStats() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  const mes = `${y}-${String(m+1).padStart(2,'0')}`;
  const mesCitas = allCitas.filter(c=>(c.fecha||'').startsWith(mes));
  const stats = [
    { label:'Total citas', val: mesCitas.length },
    { label:'Confirmadas', val: mesCitas.filter(c=>c.estado==='Confirmado').length, color:'var(--teal)' },
    { label:'Completadas', val: mesCitas.filter(c=>c.estado==='Completado').length, color:'var(--green)' },
    { label:'Canceladas', val: mesCitas.filter(c=>c.estado==='Cancelado').length, color:'var(--red)' },
    { label:'No asistió', val: mesCitas.filter(c=>c.estado==='No Asistió').length, color:'var(--purple)' },
  ];
  document.getElementById('monthStats').innerHTML = stats.map(s=>
    `<div style="display:flex;justify-content:space-between;align-items:center">
      <span>${s.label}</span>
      <span style="font-family:var(--font-mono);font-weight:700;color:${s.color||'var(--text)'}">${s.val}</span>
    </div>`).join('');
}

function updateWAPreview() {
  const expId = document.getElementById('f-paciente').value;
  const tel = document.getElementById('f-tel').value.trim();
  const fecha = document.getElementById('f-fecha').value;
  const hora = document.getElementById('f-hora').value;
  const trat = document.getElementById('f-tratamiento').value;
  let nombre = '';
  if (expId && expId !== '_nuevo') { const px=allPacientes.find(p=>p.id===expId); nombre=px?.nombre?.split(' ')[0]||''; }
  else nombre = document.getElementById('f-nombre-libre')?.value?.split(' ')[0]||'Paciente';
  const msg = `Hola ${nombre}, te confirmamos tu cita el ${fecha} a las ${hora}${trat?' para '+trat:''} en Hersantych Dental. ¿Confirmas tu asistencia?`;
  document.getElementById('whatsappPreview').textContent = tel ? '💬 ' + msg : '';
  const btnWA = document.getElementById('btnWaSend');
  btnWA.style.display = tel ? 'inline-flex' : 'none';
  btnWA.onclick = () => whatsapp(tel, msg);
}

function openNewModal(fecha) {
  editId = null;
  document.getElementById('modalCitaTitle').textContent = 'Nueva Cita';
  document.getElementById('f-paciente').value = '';
  document.getElementById('f-nombre-libre').value = '';
  document.getElementById('nombreLibreWrap').style.display = 'none';
  document.getElementById('f-fecha').value = fecha || selectedDate;
  document.getElementById('f-hora').value = '10:00';
  document.getElementById('f-duracion').value = '60';
  document.getElementById('f-tel').value = '';
  document.getElementById('f-tratamiento').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-estado').value = 'Agendado';
  document.getElementById('f-rx').value = 'No';
  document.getElementById('whatsappPreview').textContent = '';
  document.getElementById('btnWaSend').style.display = 'none';
  openModal('modalCita');
}

function editCita(id) {
  editId = id;
  const c = allCitas.find(x=>x.id===id); if(!c) return;
  document.getElementById('modalCitaTitle').textContent = 'Editar Cita';
  document.getElementById('f-paciente').value = c.expId||'_nuevo';
  if(!c.expId){ document.getElementById('nombreLibreWrap').style.display='block'; document.getElementById('f-nombre-libre').value=c.paciente||''; }
  document.getElementById('f-fecha').value = c.fecha||'';
  document.getElementById('f-hora').value = c.hora||'10:00';
  document.getElementById('f-duracion').value = c.duracion||60;
  document.getElementById('f-tel').value = c.tel||'';
  document.getElementById('f-tratamiento').value = c.tratamiento||'';
  document.getElementById('f-desc').value = c.descripcion||'';
  document.getElementById('f-estado').value = c.estado||'Agendado';
  document.getElementById('f-rx').value = c.rx||'No';
  updateWAPreview();
  openModal('modalCita');
}

async function saveCita() {
  const expId = document.getElementById('f-paciente').value;
  const fecha = document.getElementById('f-fecha').value;
  const hora  = document.getElementById('f-hora').value;
  if (!fecha || !hora) { showToast('Fecha y hora son obligatorias','error'); return; }
  let pacienteNombre = '';
  let tel = document.getElementById('f-tel').value.trim();
  if (expId && expId !== '_nuevo') {
    const px = allPacientes.find(p=>p.id===expId);
    pacienteNombre = px?.nombre||'—';
    if(!tel) tel = px?.tel||'';
  } else {
    pacienteNombre = document.getElementById('f-nombre-libre').value.trim() || 'Paciente nuevo';
  }
  const data = {
    expId: expId!=='_nuevo'?expId:null,
    paciente: pacienteNombre,
    fecha, hora,
    duracion: parseInt(document.getElementById('f-duracion').value)||60,
    tel,
    tratamiento: document.getElementById('f-tratamiento').value,
    descripcion: document.getElementById('f-desc').value.trim(),
    estado: document.getElementById('f-estado').value,
    rx: document.getElementById('f-rx').value,
  };
  const btn = document.getElementById('btnSaveCita');
  btn.disabled=true; btn.textContent='Guardando...';
  try {
    if(editId) await fsUpdate('citas',editId,data);
    else await fsCreate('citas',data);
    showToast(editId?'Cita actualizada':'Cita agendada','success');
    closeModal('modalCita');
    await loadCitas();
    renderCalendar();
    renderDay(fecha);
    renderMonthStats();
  } catch(e){ showToast('Error: '+e.message,'error'); }
  btn.disabled=false; btn.textContent='💾 Guardar cita';
}

async function deleteCita(id) {
  if(!await confirmDialog('¿Eliminar esta cita?')) return;
  try {
    await fsDelete('citas',id);
    showToast('Cita eliminada','success');
    await loadCitas();
    renderCalendar();
    renderDay(selectedDate);
    renderMonthStats();
  } catch(e){ showToast('Error: '+e.message,'error'); }
}
</script>
</body>
</html>
