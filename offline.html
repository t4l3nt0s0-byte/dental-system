<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DentalOS · Sin conexión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#00C2A8;--bg:#060D14;--surface:#0D1822;--text:#E8EAF0;--muted:#9BA3B0;--border:rgba(255,255,255,.08)}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.wrap{text-align:center;max-width:400px}
.icon{font-size:4rem;margin-bottom:1.5rem;display:block}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
p{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.5rem}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#060D14;border:none;border-radius:10px;padding:12px 24px;font-size:.9rem;font-weight:700;cursor:pointer;text-decoration:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.status{margin-top:1.5rem;font-size:.75rem;color:var(--muted)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#FF5C5C;margin-right:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.cached{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-top:1.25rem;text-align:left}
.cached-title{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.cached-link{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:.82rem;color:var(--text);text-decoration:none;transition:background .12s}
.cached-link:hover{background:rgba(255,255,255,.05)}
</style>
</head>
<body>
<div class="wrap">
  <span class="icon">🦷</span>
  <h1>Sin conexión a internet</h1>
  <p>No se puede conectar al servidor. Algunas páginas pueden estar disponibles desde el caché.</p>

  <button class="btn" onclick="tryReconnect()">
    🔄 Intentar reconectar
  </button>

  <div class="status">
    <span class="dot"></span>
    <span id="statusText">Sin conexión</span>
  </div>

  <div class="cached">
    <div class="cached-title">📱 Páginas disponibles sin conexión</div>
    <a href="index.html" class="cached-link">📊 Dashboard</a>
    <a href="agenda.html" class="cached-link">📅 Agenda</a>
    <a href="pacientes.html" class="cached-link">👤 Pacientes</a>
    <a href="expediente.html" class="cached-link">📋 Expediente</a>
    <a href="tratamientos.html" class="cached-link">🦷 Tratamientos</a>
    <a href="abonos.html" class="cached-link">💰 Abonos</a>
  </div>
</div>

<script>
function tryReconnect() {
  document.getElementById('statusText').textContent = 'Reconectando...';
  fetch('manifest.json', { cache:'no-store' })
    .then(() => window.location.href = 'index.html')
    .catch(() => {
      document.getElementById('statusText').textContent = 'Aún sin conexión';
    });
}

// Auto-detectar cuando vuelve la red
window.addEventListener('online', () => {
  document.getElementById('statusText').textContent = '¡Conexión restaurada! Redirigiendo...';
  document.querySelector('.dot').style.background = '#34D399';
  setTimeout(() => window.location.href = 'index.html', 1000);
});

window.addEventListener('offline', () => {
  document.getElementById('statusText').textContent = 'Sin conexión';
  document.querySelector('.dot').style.background = '#FF5C5C';
});
</script>
</body>
</html>
