<style>
/* FILTROS */
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filters .search-wrap{flex:1;min-width:180px}

/* GRID DE PACIENTES */
.px-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* TARJETA */
.px-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;transition:all .2s;cursor:pointer;position:relative;overflow:hidden}
.px-card:hover{border-color:rgba(0,194,168,.3);transform:translateY(-2px)}
.px-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--blue));opacity:0;transition:opacity .2s}
.px-card:hover::before{opacity:1}

/* HEADER */
.px-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.px-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--teal-dim),var(--blue-dim));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.88rem;font-weight:700;color:var(--teal);flex-shrink:0}
.px-name{font-size:.85rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:2px}
.px-exp{font-family:var(--font-mono);font-size:.65rem;color:var(--text-dim)}

/* FILAS DE INFO */
.px-row{display:flex;gap:6px;font-size:.73rem;color:var(--text-muted);margin-bottom:4px;align-items:center}
.px-row span{color:var(--text)}
.px-row .icon{font-size:.78rem;flex-shrink:0}

/* ACCIONES — 2 filas limpias */
.px-actions{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.px-actions-row{display:flex;gap:6px}
.px-actions-row .btn{flex:1;justify-content:center;font-size:.72rem;padding:6px 8px}
.px-actions-row .btn-icon-only{flex:0 0 34px;padding:6px;justify-content:center}

/* BARRA LÍMITE */
.limit-bar{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-size:.8rem;color:var(--text-muted)}
.limit-progress{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.limit-fill{height:100%;border-radius:3px;transition:width .5s;background:var(--teal)}
.limit-fill.warning{background:var(--gold)}
.limit-fill.danger{background:var(--red)}

/* MOBILE */
@media(max-width:600px){
  .px-grid{grid-template-columns:1fr}
  .filters{flex-direction:column;align-items:stretch}
  .filters .search-wrap{min-width:unset}
  .topbar-actions .btn{font-size:.72rem;padding:7px 10px}
}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<button class="hamburger" id="hamburger">☰</button>
<main class="main">
  <div class="topbar">
    <div class="topbar-title">👤 Expedientes de Pacientes</div>
    <div class="topbar-actions">
      <a href="importar-datos.html" class="btn btn-ghost btn-sm">📥 Importar desde Excel</a>
      <button class="btn btn-primary" id="btnNuevo">+ Nuevo paciente</button>
    </div>
  </div>
  <div class="content">
    <div class="limit-bar" id="limitBar" style="display:none">
      <span>📊 Pacientes:</span>
      <div class="limit-progress"><div class="limit-fill" id="limitFill"></div></div>
      <span id="limitText"></span>
    </div>
    <div class="filters">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Buscar por nombre, expediente, teléfono...">
      </div>
      <select class="form-select" id="filterGenero" style="width:140px">
        <option value="">Todos los géneros</option>
        <option>Masculino</option><option>Femenino</option><option>Otro</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="btnExport">📥 Exportar</button>
    </div>
    <div class="px-grid" id="pxGrid"><div class="loader"><div class="spinner"></div>Cargando expedientes...</div></div>
  </div>
</main>

<!-- MODAL NUEVO/EDITAR PACIENTE -->
<div class="modal-overlay" id="modalPx">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="modalPxTitle">Nuevo Paciente</div>
      <button class="modal-close" onclick="closeModal('modalPx')">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
        <!-- Col 1: Datos personales -->
        <div>
          <div style="font-size:.68rem;font-weight:700;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Datos personales</div>
          <div class="form-group"><label class="form-label">Nombre completo *</label><input class="form-input" id="f-nombre" placeholder="Apellido Apellido Nombre"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
            <div class="form-group"><label class="form-label">F. nacimiento</label><input type="date" class="form-input" id="f-fnac"></div>
            <div class="form-group"><label class="form-label">Peso (kg)</label><input type="number" class="form-input" id="f-peso" placeholder="70" min="1" max="300" step="0.1"></div>
            <div class="form-group"><label class="form-label">Género</label>
              <select class="form-select" id="f-genero"><option>Masculino</option><option>Femenino</option><option>Otro</option></select>
            </div>
          </div>
          <div class="form-group"><label class="form-label">Teléfono del paciente</label><input class="form-input" id="f-tel" placeholder="55 0000 0000" type="tel"></div>
          <div class="form-group"><label class="form-label">Correo electrónico</label><input type="email" class="form-input" id="f-email" placeholder="paciente@correo.com"></div>
          <!-- Contacto de emergencia / familiar -->
          <div style="font-size:.68rem;font-weight:700;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 10px">📞 Contacto de emergencia</div>
          <div class="form-group"><label class="form-label">Nombre del familiar</label><input class="form-input" id="f-familiar" placeholder="Nombre completo del familiar"></div>
          <div class="form-group"><label class="form-label">Parentesco</label>
            <select class="form-select" id="f-parentesco">
              <option value="">Seleccionar...</option>
              <option>Mamá</option><option>Papá</option><option>Esposo/a</option>
              <option>Hijo/a</option><option>Hermano/a</option><option>Otro</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Teléfono del familiar</label><input class="form-input" id="f-telFamiliar" placeholder="55 0000 0000" type="tel"></div>
          <div class="form-group"><label class="form-label">Dirección</label><input class="form-input" id="f-dir" placeholder="Calle, número, colonia, ciudad"></div>
          <div class="form-group"><label class="form-label">Cómo nos conoció</label>
            <select class="form-select" id="f-referido"><option value="">Seleccionar...</option><option>Recomendación</option><option>Redes sociales</option><option>Google</option><option>Publicidad</option><option>Otro</option></select>
          </div>
        </div>
        <!-- Col 2: Datos médicos -->
        <div>
          <div style="font-size:.68rem;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px">Antecedentes médicos</div>
          <div class="form-group"><label class="form-label">Alergias</label><input class="form-input" id="f-alergias" placeholder="Penicilina, Latex, Ninguna..."></div>
          <div class="form-group"><label class="form-label">Padecimientos sistémicos</label><input class="form-input" id="f-padecimientos" placeholder="Diabetes, Hipertensión, Ninguno..."></div>
          <div class="form-group"><label class="form-label">Medicamentos actuales</label><input class="form-input" id="f-medicamentos" placeholder="Metformina, Ninguno..."></div>
          <div class="form-group"><label class="form-label">¿Está embarazada?</label>
            <select class="form-select" id="f-embarazo"><option>No</option><option>Sí</option><option>N/A</option></select>
          </div>
          <div class="form-group"><label class="form-label">Tipo de sangre</label>
            <select class="form-select" id="f-sangre"><option value="">Desconocido</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
          </div>
          <div class="form-group"><label class="form-label">Observaciones / Notas</label><textarea class="form-textarea" id="f-obs" placeholder="Notas adicionales sobre el paciente..." rows="3"></textarea></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalPx')">Cancelar</button>
      <button class="btn btn-primary" id="btnSavePx">💾 Guardar paciente</button>
    </div>
  </div>
</div>

<!-- MODAL VER PACIENTE -->
<div class="modal-overlay" id="modalVer">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="verNombre"></div>
      <button class="modal-close" onclick="closeModal('modalVer')">✕</button>
    </div>
    <div class="modal-body" id="verBody"></div>
    <div class="modal-footer" id="verFooter"></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-auth-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-firestore-compat.min.js"></script>
<script src="shared.js"></script>
<script src="dataService.js"></script>
<script>
window.CURRENT_PAGE = 'pacientes';
let allPacientes = [], editId = null;

initSession('any').then(async session => {
  if (!session) { document.body.innerHTML='<div style="min-height:100vh;background:#060D14;display:flex;align-items:center;justify-content:center"><div style="text-align:center;color:#9BA3B0"><div style="font-size:2rem;margin-bottom:12px">⚠️</div><div style="font-size:1rem;color:#E8EAF0;margin-bottom:8px">Sesión no encontrada</div><div style="font-size:.85rem;margin-bottom:20px">Inicia sesión para continuar</div><a href=\"login.html\" style=\"background:#00C2A8;color:#060D14;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:700\">Iniciar sesión</a></div></div>'; return; }
  const { clinica } = session;
  const plan = PLANES[clinica.plan] || PLANES.basico;

  await loadPacientes();

  // Limit bar
  if (plan.maxPacientes !== Infinity) {
    const lb = document.getElementById('limitBar');
    lb.style.display = 'flex';
    const pct = Math.round(allPacientes.length / plan.maxPacientes * 100);
    document.getElementById('limitFill').style.width = pct + '%';
    document.getElementById('limitFill').className = 'limit-fill' + (pct>=90?' danger':pct>=70?' warning':'');
    document.getElementById('limitText').textContent = `${allPacientes.length} / ${plan.maxPacientes}`;
  }

  // Events
  document.getElementById('searchInput').addEventListener('input', renderGrid);
  document.getElementById('filterGenero').addEventListener('change', renderGrid);
  document.getElementById('btnNuevo').addEventListener('click', () => {
    if (plan.maxPacientes !== Infinity && allPacientes.length >= plan.maxPacientes) {
      showToast(`Límite de ${plan.maxPacientes} pacientes alcanzado. Actualiza tu plan.`, 'error'); return;
    }
    openNewModal();
  });
  document.getElementById('btnSavePx').addEventListener('click', savePaciente);
  document.getElementById('btnExport').addEventListener('click', exportCSV);
});

let _pxCursor = null;
const PAGE_SIZE = 25;

async function loadPacientes(reset = true) {
  if (reset) { allPacientes = []; _pxCursor = null; }
  try {
    // Sin orderBy en la query — evita índice compuesto, ordenamos en cliente
    const { docs, next } = await DS.pacientes.getPaged(_pxCursor, PAGE_SIZE);
    const sorted = docs.sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'','es'));
    allPacientes = reset ? sorted : [...allPacientes, ...sorted].sort(
      (a,b)=>(a.nombre||'').localeCompare(b.nombre||'','es')
    );
    _pxCursor = next;
    renderGrid();
    let btn = document.getElementById('btnLoadMore');
    if (!btn) {
      btn = document.createElement('div');
      btn.id = 'btnLoadMore';
      btn.style.cssText = 'text-align:center;margin:16px 0';
      const grid = document.getElementById('pxGrid');
      if(grid) grid.insertAdjacentElement('afterend', btn);
    }
    btn.innerHTML = next
      ? `<button class="btn btn-ghost btn-sm" onclick="loadPacientes(false)" style="min-width:180px">Cargar más pacientes</button>`
      : '';
  } catch(e) { handleError(e, 'loadPacientes'); }
}

// Calcular edad en años desde una fecha ISO (ej '1990-03-15')
function calcEdad(fnac){
  if(!fnac) return null;
  try{
    const fn  = new Date(fnac + 'T12:00:00');
    const hoy = new Date();
    let e = hoy.getFullYear() - fn.getFullYear();
    if(hoy.getMonth()<fn.getMonth()||(hoy.getMonth()===fn.getMonth()&&hoy.getDate()<fn.getDate())) e--;
    return (e>=0&&e<130) ? e : null;
  }catch(e){ return null; }
}

function renderGrid() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const g = document.getElementById('filterGenero').value;
  const filtered = allPacientes.filter(p =>
    (!q || p.nombre?.toLowerCase().includes(q) || p.tel?.includes(q) || p.expediente?.toLowerCase().includes(q) || p.email?.toLowerCase().includes(q) || p.folio?.toLowerCase().includes(q)) &&
    (!g || p.genero === g)
  );
  const grid = document.getElementById('pxGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👤</div><div class="empty-title">Sin resultados</div><div class="empty-sub">Intenta con otro término de búsqueda</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const initials = (p.nombre||'?').split(' ').slice(0,2).map(w=>w[0]).join('');
    const edad = p.fnac ? Math.floor((new Date()-new Date(p.fnac))/31557600000) : p.edad || '—';
    return `<div class="px-card" onclick="verPaciente('${p.id}')">
      <div class="px-header">
        <div class="px-avatar">${initials}</div>
        <div>
          <div class="px-name">${esc(p.nombre)||'Sin nombre'}</div>
          <div class="px-exp">${p.folio ? `<span style="color:var(--teal);font-weight:700">${esc(p.folio)}</span>` : (p.expediente||p.id.slice(0,8))}</div>
        </div>
      </div>
      <div class="px-row"><span class="icon">👤</span><span>${p.genero||'—'} · ${edad} años</span></div>
      <div class="px-row"><span class="icon">📱</span><span>${esc(p.tel)||'Sin teléfono'}</span></div>
      ${p.alergias&&p.alergias!=='Ninguna'?`<div class="px-row"><span class="icon">⚠️</span><span style="color:var(--gold)">${p.alergias}</span></div>`:''}
      ${p.padecimientos&&p.padecimientos!=='Ninguno'?`<div class="px-row"><span class="icon">🏥</span><span>${p.padecimientos}</span></div>`:''}
      <div class="px-actions">
        <!-- FILA 1: Acciones principales -->
        <div class="px-actions-row">
          <a href="expediente.html?px=${p.id}" class="btn btn-primary btn-sm" onclick="event.stopPropagation()">📋 Expediente</a>
          <a href="tratamientos.html?exp=${p.id}" class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">🦷 Trats.</a>
        </div>
        <!-- FILA 2: Editar + WhatsApp -->
        <div class="px-actions-row">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editPaciente('${p.id}')">✏️ Editar</button>
          ${p.tel ? `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();whatsapp('${p.tel}','Hola ${p.nombre?.split(' ')[0]||''}')">💬 WA</button>` : '<div style="flex:1"></div>'}
        </div>
        <!-- 🗑️ ELIMINAR — DESACTIVADO TEMPORALMENTE
             ════════════════════════════════════════
             Para REACTIVAR el botón eliminar:
             ARCHIVO: pacientes.html
             BUSCA este bloque de comentario y
             reemplázalo con la siguiente línea:

             <div class="px-actions-row">
               <button class="btn btn-ghost btn-sm" style="color:var(--red);flex:1" onclick="event.stopPropagation();deletePaciente('${p.id}')">🗑️ Eliminar</button>
             </div>

             La función deletePaciente() está en la línea ~314
             ════════════════════════════════════════ -->
      </div>
    </div>`;
  }).join('');
}

function openNewModal() {
  editId = null;
  // Limpiar búsqueda antes de abrir para que al cerrar muestre todos
  document.getElementById('searchInput').value = '';
  document.getElementById('filterGenero').value = '';
  document.getElementById('modalPxTitle').textContent = 'Nuevo Paciente';
  ['f-nombre','f-tel','f-email','f-dir','f-alergias','f-padecimientos','f-medicamentos','f-obs','f-familiar','f-telFamiliar'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('f-fnac').value = '';
  const pesoEl=document.getElementById('f-peso'); if(pesoEl) pesoEl.value='';
  document.getElementById('f-genero').value = 'Masculino';
  document.getElementById('f-embarazo').value = 'No';
  document.getElementById('f-sangre').value = '';
  document.getElementById('f-referido').value = '';
  openModal('modalPx');
}

function editPaciente(id) {
  editId = id;
  const p = allPacientes.find(x=>x.id===id); if(!p) return;
  document.getElementById('modalPxTitle').textContent = 'Editar Paciente';
  document.getElementById('f-nombre').value = p.nombre||'';
  document.getElementById('f-fnac').value = p.fnac||'';
  const pesoEdEl=document.getElementById('f-peso'); if(pesoEdEl) pesoEdEl.value=p.peso||'';
  document.getElementById('f-genero').value = p.genero||'Masculino';
  document.getElementById('f-tel').value = p.tel||'';
  document.getElementById('f-email').value = p.email||'';
  document.getElementById('f-dir').value = p.direccion||'';
  document.getElementById('f-familiar').value = p.nombreFamiliar||p.familiar||'';
  document.getElementById('f-parentesco').value = p.parentesco||'';
  document.getElementById('f-telFamiliar').value = p.telFamiliar||'';
  document.getElementById('f-alergias').value = p.alergias||'';
  document.getElementById('f-padecimientos').value = p.padecimientos||'';
  document.getElementById('f-medicamentos').value = p.medicamentos||'';
  document.getElementById('f-embarazo').value = p.embarazo||'No';
  document.getElementById('f-sangre').value = p.sangre||'';
  document.getElementById('f-obs').value = p.observaciones||'';
  document.getElementById('f-referido').value = p.referido||'';
  openModal('modalPx');
}

async function savePaciente() {
  const nombre = document.getElementById('f-nombre').value.trim().toUpperCase();
  if (!nombre) { showToast('El nombre es obligatorio','error'); return; }

  // ── Verificar límite de pacientes según plan ──────────────
  if (!editId) { // Solo al crear, no al editar
    const plan = SESSION?.clinica?.plan || 'trial';
    const maxPx = (typeof PLANES !== 'undefined' && PLANES[plan]?.maxPacientes) || 5;
    if (maxPx !== Infinity && allPacientes.length >= maxPx) {
      const planNombre = (typeof PLANES !== 'undefined' && PLANES[plan]?.nombre) || plan;
      showToast(`Plan ${planNombre}: límite de ${maxPx} pacientes alcanzado`, 'error');
      setTimeout(() => { window.location.href = 'planes.html?limit=pacientes'; }, 1800);
      return;
    }
  }

  // Detección de duplicados (normaliza a mayúsculas para comparar)
  if (!editId) {
    const dup = allPacientes.find(p => (p.nombre||'').toUpperCase().trim() === nombre);
    if (dup) {
      const continuar = await confirmDialog(`⚠️ Ya existe un paciente con el nombre "${dup.nombre}" (Expediente: ${dup.expediente||dup.id}).\n\n¿Deseas registrarlo de todas formas?`);
      if (!continuar) return;
    }
  }
  const btn = document.getElementById('btnSavePx');
  btn.disabled = true; btn.textContent = 'Guardando...';
  const fnac = document.getElementById('f-fnac').value;
  const pesoRaw  = document.getElementById('f-peso')?.value||'';
  const pesoNum  = parseFloat(pesoRaw);
  const pesoVal  = (!pesoRaw || isNaN(pesoNum) || pesoNum < 1 || pesoNum > 300)
    ? null
    : Math.round(pesoNum * 10) / 10; // un decimal max
  if(pesoRaw && pesoVal === null){
    showToast('El peso debe ser un número entre 1 y 300 kg','error');
    document.getElementById('f-peso')?.focus();
    return;
  }
  const edad = fnac ? Math.floor((new Date()-new Date(fnac))/31557600000) : null;
  // Generar folio único al crear (no al editar)
  let folio = null;
  if (!editId) {
    // Verificar duplicados antes de crear
    const dupes = await checkDuplicate(nombre, document.getElementById('f-tel').value.trim()).catch(()=>[]);
    if (dupes.length > 0) {
      const dupe = dupes[0];
      const confirmCreate = await confirmDialog(
        `⚠️ Ya existe un paciente similar:\n\n` +
        `Folio: ${dupe.folio || dupe.id.slice(0,8)}\n` +
        `Nombre: ${dupe.nombre}\n` +
        `Tel: ${dupe.tel || '—'}\n\n` +
        `¿Deseas crear un nuevo expediente de todas formas?`
      );
      if (!confirmCreate) {
        btn.disabled = false;
        btn.textContent = editId ? '💾 Actualizar' : '💾 Guardar paciente';
        return;
      }
    }
    folio = await generateFolio().catch(() => null);
  }

  const data = {
    nombre,
    fnac, edad,
    genero: document.getElementById('f-genero').value,
    tel: document.getElementById('f-tel').value.trim(),
    email: document.getElementById('f-email').value.trim().toLowerCase(),
    direccion: document.getElementById('f-dir').value.trim(),
    peso: pesoVal,
    nombreFamiliar: document.getElementById('f-familiar').value.trim(),
    parentesco: document.getElementById('f-parentesco').value,
    telFamiliar: document.getElementById('f-telFamiliar').value.trim(),
    alergias: document.getElementById('f-alergias').value.trim()||'Ninguna',
    padecimientos: document.getElementById('f-padecimientos').value.trim()||'Ninguno',
    medicamentos: document.getElementById('f-medicamentos').value.trim()||'Ninguno',
    embarazo: document.getElementById('f-embarazo').value,
    sangre: document.getElementById('f-sangre').value,
    observaciones: document.getElementById('f-obs').value.trim(),
    referido: document.getElementById('f-referido').value,
    ...(folio ? { folio } : {}),  // folio solo al crear
  };
  try {
    if (editId) {
      await DS.pacientes.update(editId, data);
      showToast('Paciente actualizado','success');
    if(typeof audit==='function') audit('UPDATE_PACIENTE',{nombre:document.getElementById('f-nombre')?.value||''});
    } else {
      const count = allPacientes.length + 1;
      data.expediente = 'P-' + String(count).padStart(3,'0');
      data.alta = new Date().toLocaleDateString('es-MX');
      await DS.pacientes.create(data);
      showToast('Paciente registrado','success');
    if(typeof audit==='function') audit('CREATE_PACIENTE',{nombre:document.getElementById('f-nombre')?.value||''});
    }
    closeModal('modalPx');
    // Limpiar búsqueda para mostrar todos los pacientes
    document.getElementById('searchInput').value = '';
    document.getElementById('filterGenero').value = '';
    await loadPacientes();
  } catch(e) { handleError(e, 'pacientes'); }
  btn.disabled = false; btn.textContent = '💾 Guardar paciente';
}

async function deletePaciente(id) {
  const p = allPacientes.find(x=>x.id===id);
  const nombre = p?.nombre || 'este paciente';
  // Contar registros relacionados
  const [trats, abonos, citas] = await Promise.all([
    fsGetAll('tratamientos', r=>r.where('expId','==',id)),
    fsGetAll('abonos', r=>r.where('expId','==',id)),
    fsGetAll('citas', r=>r.where('expId','==',id)),
  ]);
  const msg = `¿Eliminar el expediente de ${nombre}?\n\nSe eliminarán también:\n• ${trats.length} tratamiento(s)\n• ${abonos.length} abono(s)\n• ${citas.length} cita(s)\n\nEsta acción NO se puede deshacer.`;
  if (!await confirmDialog(msg)) return;
  try {
    // Eliminar todos los registros relacionados
    const deletes = [
      ...trats.map(t => fsDelete('tratamientos', t.id)),
      ...abonos.map(a => fsDelete('abonos', a.id)),
      ...citas.map(c => fsDelete('citas', c.id)),
    ];
    await Promise.all(deletes);
    // Eliminar RX y notas clínicas si existen
    try {
      const [rxList, notas] = await Promise.all([
        fsGetAll('rx', r=>r.where('expId','==',id)),
        fsGetAll('notas-clinicas', r=>r.where('expId','==',id)),
      ]);
      await Promise.all([
        ...rxList.map(r=>fsDelete('rx',r.id)),
        ...notas.map(n=>fsDelete('notas-clinicas',n.id)),
      ]);
    } catch(e) { /* rx/notas pueden no existir */ }
    // Eliminar el expediente
    await fsDelete('pacientes', id);
    showToast(`Expediente de ${nombre} eliminado correctamente`, 'success');
    // Limpiar búsqueda y mostrar todos los pacientes
    document.getElementById('searchInput').value = '';
    document.getElementById('filterGenero').value = '';
    await loadPacientes();
  } catch(e) { handleError(e, 'pacientes'); }
}

async function verPaciente(id) {
  const p = allPacientes.find(x=>x.id===id); if(!p) return;
  const tratamientos = await fsGetAll('tratamientos', r => r.where('expId','==',id));
  const totalCosto = tratamientos.reduce((s,t)=>s+Number(t.costo||0),0);
  const totalAbonado = tratamientos.reduce((s,t)=>s+Number(t.abonado||0),0);
  const saldo = totalCosto - totalAbonado;

  document.getElementById('verNombre').textContent = p.nombre||'Paciente';
  document.getElementById('verBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div style="font-size:.65rem;font-weight:700;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">Datos personales</div>
        ${infoRow('📋 Expediente', p.expediente||p.id)}
        ${infoRow('👤 Género', p.genero||'—')}
        ${infoRow('🎂 F. Nacimiento', p.fnac||'—')}
        ${infoRow('🔢 Edad', p.edad ? p.edad+' años' : '—')}
        ${infoRow('📱 Teléfono', p.tel||'—')}
        ${infoRow('✉️ Correo', p.email||'—')}
        ${infoRow('📍 Dirección', p.direccion||'—')}
        ${infoRow('📅 Alta', p.alta||'—')}
        ${infoRow('🔗 Referido por', p.referido||'—')}
      </div>
      <div>
        <div style="font-size:.65rem;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">Antecedentes médicos</div>
        ${infoRow('⚠️ Alergias', p.alergias||'Ninguna')}
        ${infoRow('🏥 Padecimientos', p.padecimientos||'Ninguno')}
        ${infoRow('💊 Medicamentos', p.medicamentos||'Ninguno')}
        ${infoRow('🤱 Embarazo', p.embarazo||'No')}
        ${infoRow('🩸 Tipo sangre', p.sangre||'Desconocido')}
        ${p.observaciones ? infoRow('📝 Notas', p.observaciones) : ''}
        <div style="margin-top:16px;padding:14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)">
          <div style="font-size:.65rem;font-weight:700;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Resumen financiero</div>
          ${infoRow('🦷 Tratamientos', tratamientos.length)}
          ${infoRow('💵 Total cobrado', `<span style="color:var(--teal)">${fmtMXN(totalAbonado)}</span>`)}
          ${saldo>0 ? infoRow('❗ Saldo pendiente', `<span style="color:var(--red)">${fmtMXN(saldo)}</span>`) : infoRow('✅ Estado', '<span style="color:var(--green)">Sin adeudos</span>')}
        </div>
      </div>
    </div>
    ${tratamientos.length ? `
    <div style="margin-top:18px">
      <div style="font-size:.65rem;font-weight:700;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">Tratamientos</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Tratamiento</th><th>Inicio</th><th>Costo</th><th>Abonado</th><th>Saldo</th><th>Estado</th></tr></thead>
          <tbody>${tratamientos.map(t=>`<tr>
            <td>${t.tratamiento||'—'}</td>
            <td>${t.fechaInicio||'—'}</td>
            <td style="font-family:var(--font-mono)">${fmtMXN(t.costo)}</td>
            <td style="font-family:var(--font-mono);color:var(--green)">${fmtMXN(t.abonado)}</td>
            <td style="font-family:var(--font-mono);color:var(--red)">${fmtMXN(t.saldo)}</td>
            <td><span class="badge ${t.estado==='Liquidado'?'badge-green':t.estado==='Abonando'?'badge-gold':'badge-red'}">${t.estado||'Pendiente'}</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>` : ''}`;

  document.getElementById('verFooter').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('modalVer')">Cerrar</button>
    ${p.tel ? `<button class="btn btn-ghost" onclick="whatsapp('${p.tel}','Hola ${p.nombre?.split(' ')[0]||''}')">💬 WhatsApp</button>` : ''}
    <button class="btn btn-ghost" onclick="closeModal('modalVer');editPaciente('${p.id}')">✏️ Editar</button>
    <a href="expediente.html?px=${p.id}" class="btn btn-primary">📋 Expediente completo</a>
    <a href="tratamientos.html?exp=${p.id}" class="btn btn-ghost">🦷 Tratamientos</a>`;
  openModal('modalVer');
}

function infoRow(label, val) {
  return `<div style="display:flex;gap:8px;margin-bottom:7px;font-size:.8rem"><span style="color:var(--text-dim);min-width:130px">${label}</span><span style="color:var(--text)">${val}</span></div>`;
}

function exportCSV() {
  const headers = ['Expediente','Nombre','Género','F.Nacimiento','Teléfono','Email','Alergias','Padecimientos','Alta'];
  const rows = allPacientes.map(p => [p.expediente||p.id, p.nombre, p.genero, p.fnac, p.tel, p.email, p.alergias, p.padecimientos, p.alta].map(v=>`"${v||''}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = `pacientes_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('Exportación completada','success');
}
