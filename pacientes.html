<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DentalOS · Expedientes</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#060D14;
--surface:#0C1622;
--surface2:#111E2E;
--border:rgba(255,255,255,.07);
--teal:#00C2A8;
--teal-dim:rgba(0,194,168,.12);
--red:#FF5C5C;
--red-dim:rgba(255,92,92,.1);
--blue:#4A9EFF;
--blue-dim:rgba(74,158,255,.1);
--text:#E8F0F8;
--text-muted:rgba(232,240,248,.45);
--text-dim:rgba(232,240,248,.25);
--font-display:'Instrument Serif',serif;
--font-body:'DM Sans',sans-serif;
--font-mono:'JetBrains Mono',monospace;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:var(--font-body);
background:var(--bg);
color:var(--text);
min-height:100vh;
}

.sidebar{
position:fixed;
left:0;
top:0;
bottom:0;
width:240px;
background:var(--surface);
border-right:1px solid var(--border);
padding:24px;
}

.logo{
font-size:1.6rem;
font-family:var(--font-display);
margin-bottom:30px;
}

.logo span{
color:var(--teal);
}

.nav{
display:flex;
flex-direction:column;
gap:10px;
}

.nav a{
color:var(--text-muted);
text-decoration:none;
padding:10px 14px;
border-radius:10px;
transition:.2s;
}

.nav a:hover,
.nav a.active{
background:var(--surface2);
color:var(--teal);
}

.main{
margin-left:240px;
min-height:100vh;
}

.topbar{
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid var(--border);
background:var(--surface);
}

.topbar-title{
font-size:1.5rem;
font-family:var(--font-display);
}

.content{
padding:30px;
}

.btn{
padding:10px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
font-family:var(--font-body);
}

.btn-primary{
background:var(--teal);
color:#000;
}

.btn-primary:hover{
opacity:.9;
}

.search-input{
width:100%;
padding:14px;
background:var(--surface);
border:1px solid var(--border);
border-radius:10px;
color:white;
margin-bottom:24px;
outline:none;
}

.search-input:focus{
border-color:var(--teal);
}

.patients-table-wrap{
background:var(--surface);
border:1px solid var(--border);
border-radius:20px;
overflow:hidden;
}

.table-head,
.patient-row{
display:grid;
grid-template-columns:
100px
1fr
80px
120px
130px
150px
120px;
align-items:center;
padding:16px 20px;
}

.table-head{
background:var(--surface2);
font-size:.72rem;
text-transform:uppercase;
color:var(--text-dim);
font-weight:600;
}

.patient-row{
border-top:1px solid var(--border);
transition:.2s;
}

.patient-row:hover{
background:var(--surface2);
}

.exp-badge{
background:var(--teal-dim);
color:var(--teal);
padding:4px 10px;
border-radius:6px;
font-size:.75rem;
font-family:var(--font-mono);
}

.gender-badge{
padding:4px 10px;
border-radius:999px;
font-size:.72rem;
font-weight:600;
}

.gender-f{
background:rgba(255,100,200,.1);
color:#ff64c8;
}

.gender-m{
background:var(--blue-dim);
color:var(--blue);
}

.empty-state{
padding:50px;
text-align:center;
color:var(--text-muted);
}

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:1000;
}

.modal-overlay.open{
display:flex;
}

.modal{
background:var(--surface);
width:100%;
max-width:700px;
border-radius:24px;
padding:24px;
border:1px solid var(--border);
}

.modal-title{
font-size:1.4rem;
margin-bottom:20px;
font-family:var(--font-display);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.form-group{
display:flex;
flex-direction:column;
gap:6px;
}

.form-group.full{
grid-column:1/-1;
}

.form-label{
font-size:.8rem;
color:var(--text-muted);
}

.form-input,
.form-select{
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:var(--surface2);
color:white;
outline:none;
}

.form-input:focus,
.form-select:focus{
border-color:var(--teal);
}

.modal-footer{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:24px;
}

.btn-secondary{
background:transparent;
border:1px solid var(--border);
color:white;
}

</style>
</head>

<body>

<aside class="sidebar">

<div class="logo">
Dental<span>OS</span>
</div>

<nav class="nav">
<a href="index.html">📊 Dashboard</a>
<a href="agenda.html">📅 Agenda</a>
<a href="pacientes.html" class="active">👤 Pacientes</a>
<a href="tratamientos.html">🦷 Tratamientos</a>
</nav>

</aside>

<main class="main">

<div class="topbar">

<div class="topbar-title">
👤 Expedientes
</div>

<button class="btn btn-primary" onclick="openModal()">
+ Nuevo Paciente
</button>

</div>

<div class="content">

<input
type="text"
class="search-input"
id="searchInput"
placeholder="Buscar por nombre, expediente o teléfono..."
oninput="renderTable()"
>

<div class="patients-table-wrap">

<div class="table-head">
<div>Exp.</div>
<div>Paciente</div>
<div>Edad</div>
<div>Género</div>
<div>Teléfono</div>
<div>Alergias</div>
<div>Alta</div>
</div>

<div id="tableBody"></div>

</div>

</div>

</main>

<!-- MODAL -->

<div class="modal-overlay" id="modal">

<div class="modal">

<div class="modal-title">
Nuevo Expediente
</div>

<div class="form-grid">

<div class="form-group">
<label class="form-label">Nombre completo</label>
<input class="form-input" id="f-nombre">
</div>

<div class="form-group">
<label class="form-label">Expediente</label>
<input class="form-input" id="f-exp">
</div>

<div class="form-group">
<label class="form-label">Fecha nacimiento</label>
<input type="date" class="form-input" id="f-fnac">
</div>

<div class="form-group">
<label class="form-label">Género</label>

<select class="form-select" id="f-genero">
<option>Masculino</option>
<option>Femenino</option>
</select>
</div>

<div class="form-group">
<label class="form-label">Teléfono</label>
<input class="form-input" id="f-tel">
</div>

<div class="form-group">
<label class="form-label">Correo</label>
<input class="form-input" id="f-email">
</div>

<div class="form-group full">
<label class="form-label">Alergias</label>
<input class="form-input" id="f-alergias">
</div>

</div>

<div class="modal-footer">

<button class="btn btn-secondary" onclick="closeModal()">
Cancelar
</button>

<button class="btn btn-primary" onclick="savePatient()">
Guardar
</button>

</div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import {
  leerPacientes,
  guardarPaciente
} from "./shared.js";

let patients = [];




  function renderTable(){

  const q = document.getElementById('searchInput').value.toLowerCase();

  let filtered = patients.filter(p => {

    const match =
      (p.nombre || '').toLowerCase().includes(q) ||
      (p.exp || '').toLowerCase().includes(q) ||
      (p.tel || '').includes(q);

    return match;

  });

  const body = document.getElementById('tableBody');

  if(!filtered.length){

    body.innerHTML = `
      <div class="empty-state">
        No se encontraron pacientes
      </div>
    `;

    return;
  }

  body.innerHTML = filtered.map(p => `
    <div class="patient-row">
      <div>${p.exp || '-'}</div>
      <div>${p.nombre || '-'}</div>
      <div>${p.edad || '-'}</div>
      <div>${p.genero || '-'}</div>
      <div>${p.tel || '-'}</div>
      <div>${p.alergias || '-'}</div>
      <div>${p.alta || '-'}</div>
    </div>
  `).join('');

}

window.openModal = function(){

  document
    .getElementById('modal')
    .classList.add('open');

}

window.closeModal = function(){

  document
    .getElementById('modal')
    .classList.remove('open');

}

window.savePatient = async function(){

  const nombre =
    document.getElementById('f-nombre')
    .value
    .toUpperCase()
    .trim();

  const exp =
    document.getElementById('f-exp')
    .value
    .trim();

  if(!nombre || !exp){

    alert('Nombre y expediente obligatorios');

    return;
  }

  const p = {

    exp,
    nombre,

    fnac:
      document.getElementById('f-fnac').value,

    edad:'',

    genero:
      document.getElementById('f-genero').value,

    tel:
      document.getElementById('f-tel').value,

    email:
      document.getElementById('f-email').value,

    alergias:
      document.getElementById('f-alergias').value || 'Ninguna',

    padecimientos:
      document.getElementById('f-padec').value || 'Ninguna',

    alta:
      new Date().toLocaleDateString('es-MX'),

    visitas:0
  };

  if(p.fnac){

    const d = new Date(p.fnac);

    const hoy = new Date();

    p.edad = Math.floor(
      (hoy - d) / 31557600000
    );

  }

  console.log("GUARDANDO:", p);

  const ok = await guardarPaciente(p);

  if(ok){

    alert("Paciente guardado");

    patients.push(p);

    renderTable();

    closeModal();

  }else{

    alert("Error guardando");

  }

}

async function cargarPacientes(){

  console.log("CARGANDO PACIENTES...");

  patients = await leerPacientes();

  console.log("PACIENTES:", patients);

  renderTable();

}

cargarPacientes();

</script>

</body>
</html>
